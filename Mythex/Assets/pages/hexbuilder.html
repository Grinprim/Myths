<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Builder</title>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #1f2937;
    color: #cbd5e1;
    margin: 0;
    display: flex;
}

.container {
    display: flex;
    width: 100%;
}

/* SIDE MENU */
.sidebar {
    width: 260px;
    background: rgba(15,23,42,0.9);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.1);
    overflow-y: auto;
}

.sidebar h2 {
    color: white;
    font-size: 1.2rem;
    margin-bottom: 10px;
}

.selector {
    margin-bottom: 15px;
}

select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    background: #111827;
    color: #cbd5e1;
    border: 1px solid rgba(255,255,255,0.1);
}

select:hover {
    border-color: #60a5fa;
}

button {
    width: 100%;
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #2563eb;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hex-container {
    position: relative;
    width: 320px;
    height: 320px;
}

#hex-stitch-container {
    position: relative;
    width: 100%;
    height: 100%;
}

/* CENTER IMAGE */
.center-img {
    position: absolute;
    width: 120px;
    height: 120px;
    margin-top: 60px; /* Adjust to center vertically */
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

/* SEGMENTS */
.hex-img {
    position: absolute;
    width: 120px;
    height: 120px;
    transform-origin: 50% 100%;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Segments</h2>
        <div id="segment-selectors"></div>

        <h2>Center</h2>
        <div class="selector">
            <select id="centerSelector"><option>-None-</option></select>
        </div>

        <button onclick="randomizeAll()">Randomize</button>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="hex-container">
            <div id="hex-stitch-container"></div>
        </div>
    </div>

</div>

<script>
let segmentImages = Array(6).fill("");
let centerImage = "";

let segmentOptions = [];
let centerOptions = [];

// Load JSON config
async function loadAssets() {
    const res = await fetch('../img/hex-parts/hex-parts.json');
    const data = await res.json();

    segmentOptions = data.segments.map(f => `../img/hex-parts/${f}`);
    centerOptions = data.centers.map(f => `../img/hex-parts/center/${f}`);

    initUI();
}

// Build selectors
function initUI() {
    const container = document.getElementById('segment-selectors');

    for (let i = 0; i < 6; i++) {
        const div = document.createElement('div');
        div.className = "selector";

        const select = document.createElement('select');

        segmentOptions.forEach(path => {
            const option = document.createElement('option');
            option.value = path;
            option.textContent = path.split('/').pop();
            select.appendChild(option);
        });

        select.onchange = () => {
            segmentImages[i] = select.value;
            renderHex();
        };

        segmentImages[i] = segmentOptions[0];

        div.appendChild(select);
        container.appendChild(div);
    }

    // Center selector
    const centerSelect = document.getElementById('centerSelector');

    centerOptions.forEach(path => {
        const option = document.createElement('option');
        option.value = path;
        option.textContent = path.split('/').pop();
        centerSelect.appendChild(option);
    });

    centerImage = "";

    centerSelect.onchange = () => {
        if (centerSelect.value === "-None-") {
            centerImage = "";
        } else {
            centerImage = centerSelect.value;
        }
        renderHex();
    };

    renderHex();
}

// Render hex
function renderHex() {
    const container = document.getElementById('hex-stitch-container');
    container.innerHTML = '';

    const center = 160;
    const radius = 104;
    const imgSize = 120;

    // Segments
    for (let i = 0; i < 6; i++) {
        const angle = i * 60;
        const rad = (angle - 90) * Math.PI / 180;

        const x = center + radius * Math.cos(rad) - imgSize / 2;
        const y = center + radius * Math.sin(rad) - imgSize / 2;

        const img = document.createElement('img');
        img.src = segmentImages[i];
        img.className = "hex-img";

        img.style.left = `${x}px`;
        img.style.top = `${y}px`;
        img.style.transform = `rotate(${angle + 180}deg)`;

        container.appendChild(img);
    }

    // Center
    if (centerImage) {
        const centerImg = document.createElement('img');
        centerImg.src = centerImage;
        centerImg.className = "center-img";

        container.appendChild(centerImg);
    }
}

// Randomizer
function randomizeAll() {
    segmentImages = segmentImages.map(() =>
        segmentOptions[Math.floor(Math.random() * segmentOptions.length)]
    );

    if (document.getElementById('centerSelector').value === "-None-") {
        centerImage = "";
    } else {
        centerImage = centerOptions[Math.floor(Math.random() * centerOptions.length)];
    }

    renderHex();
}

loadAssets();
</script>

</body>
</html>
