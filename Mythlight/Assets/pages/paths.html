<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mythlight RPG | Paths & Traits</title>
  <link rel="icon" type="image/png" href="../img/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --ink: #e8e4dc;
      --ink-dim: #9a9488;
      --ink-faint: #5a5650;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.14);
      --gold-line: rgba(201,168,76,0.30);
      --indigo: #818cf8;
      --indigo-dim: rgba(129,140,248,0.12);
      --red: #f87171;
      --sky: #67e8f9;
      --void: #060a14;
      --surface-0: rgba(255,255,255,0.025);
      --surface-1: rgba(255,255,255,0.045);
      --border: rgba(255,255,255,0.07);
      --border-gold: rgba(201,168,76,0.25);
      --clr-body: #ef4444;
      --clr-skill: #10b981;
      --clr-mind: #a855f7;
      --clr-style: #ec4899;
      --clr-free: #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a14;
      color: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1,h2,h3,h4,h5 { font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: 0.02em; color: var(--ink); }

    /* ── Cosmos Background ── */
    .cosmos { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .nebula {
      position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
      background: radial-gradient(circle at 25% 35%, rgba(99,102,241,0.13), transparent 45%),
                  radial-gradient(circle at 75% 65%, rgba(168,85,247,0.09), transparent 50%),
                  radial-gradient(circle at 50% 10%, rgba(201,168,76,0.05), transparent 40%);
      filter: blur(80px);
      animation: driftNebula 140s linear infinite;
    }
    @keyframes driftNebula { from { transform: translate(0,0) scale(1); } to { transform: translate(-8%,-8%) scale(1.08); } }

    .stars { position: absolute; inset: 0; }
    .stars.layer1 { width: 2px; height: 2px; background: white; box-shadow: 250px 150px rgba(255,255,255,.7), 650px 320px rgba(255,255,255,.5), 1050px 480px rgba(255,255,255,.6), 450px 720px rgba(255,255,255,.4), 1350px 280px rgba(255,255,255,.7), 850px 650px rgba(255,255,255,.5), 1450px 550px rgba(255,255,255,.6); }
    .stars.layer2 { width: 2px; height: 2px; background: white; box-shadow: 180px 420px rgba(255,255,255,.4), 720px 180px rgba(255,255,255,.5), 980px 620px rgba(255,255,255,.4), 380px 880px rgba(255,255,255,.3), 1580px 320px rgba(255,255,255,.5), 780px 580px rgba(255,255,255,.4), 1180px 420px rgba(255,255,255,.3); }

    .shooting-star { position: absolute; width: 2px; height: 2px; background: white; opacity: 0; transform: rotate(-35deg); }
    .shooting-star::after { content: ""; position: absolute; width: 100px; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,.8), transparent); }
    @keyframes shoot { 0% { opacity: 0; transform: translate(0,0) rotate(-35deg); } 10% { opacity: .7; } 100% { opacity: 0; transform: translate(-800px,400px) rotate(-35deg); } }
    .s1 { top: 20%; left: 80%; animation: shoot 6s linear infinite; animation-delay: 2s; }
    .s2 { top: 40%; left: 60%; animation: shoot 8s linear infinite; animation-delay: 5s; }
    .s3 { top: 10%; left: 50%; animation: shoot 7s linear infinite; animation-delay: 8s; }


    /* ── Layout ── */
    main { position: relative; z-index: 1; max-width: 1800px; margin: 0 auto; }

    /* ── Path Constellation Map ── */
    .constellation-map {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: transparent;
      border: transparent;
      border-radius: 0;
      overflow: hidden;
    }

    .path-card {
      background: #060a14;
      padding: 1.25rem;
      margin: 1px;
      cursor: pointer;
      transition: background .2s, transform .15s;
      position: relative;
      border: none;
      text-align: left;
      color: inherit;
      font-family: inherit;
    }
    .path-card:hover { background: rgba(201,168,76,.07); }
    .path-card.active { background: rgba(201,168,76,.12); }
    .path-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform .25s ease;
    }
    .path-card.active::after, .path-card:hover::after { transform: scaleX(1); }

    .path-card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.06em;
      margin-bottom: .35rem;
    }
    .path-card-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .path-card-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: .5;
      display: inline-block;
      margin-right: 4px;
      transition: opacity .2s;
    }
    .path-card:hover .path-card-dot, .path-card.active .path-card-dot { opacity: 1; }

    /* ── Detail Panel ── */
    #detail-panel {
      display: none;
      animation: fadeSlideUp .3s ease;
    }
    #detail-panel.visible { display: block; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Trait Cards ── */
    .trait-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .trait-card {
      background: linear-gradient(135deg, rgba(20,28,44,.9) 0%, rgba(10,16,28,.9) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      position: relative;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      overflow: hidden;
    }
    .trait-card:hover {
      border-color: var(--border-gold);
      box-shadow: 0 6px 20px rgba(201,168,76,.08);
      transform: translateY(-2px);
    }
    .trait-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }
    .trait-card[data-action="◆"]::before { background: var(--clr-style); }
    .trait-card[data-action="◇"]::before { background: var(--clr-skill); }
    .trait-card[data-action="⬖"]::before { background: var(--clr-mind); }
    .trait-card[data-action="⭘"]::before { background: var(--clr-free); }

    .trait-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .5rem;
    }

    .trait-name {
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: .04em;
    }

    .action-badge {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .badge-attack  { background: rgba(236,72,153,.15); color: #f472b6; border-color: rgba(236,72,153,.3); }
    .badge-react   { background: rgba(16,185,129,.12); color: #34d399; border-color: rgba(16,185,129,.3); }
    .badge-action  { background: rgba(168,85,247,.12); color: #c084fc; border-color: rgba(168,85,247,.3); }
    .badge-free    { background: rgba(148,163,184,.1);  color: #94a3b8; border-color: rgba(148,163,184,.2); }

    .cost-pip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid var(--gold-line);
      border-radius: 999px;
      padding: 1px 8px;
      margin-bottom: .45rem;
    }

    .trait-desc {
      font-size: .82rem;
      color: #b8b0a4;
      line-height: 1.6;
    }

    .trait-scaling {
      margin-top: .5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: var(--indigo);
      background: var(--indigo-dim);
      border: 1px solid rgba(129,140,248,.2);
      border-radius: 5px;
      padding: .35rem .6rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .prereq-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      color: var(--sky);
      background: rgba(103,232,249,.08);
      border: 1px solid rgba(103,232,249,.2);
      border-radius: 4px;
      padding: 1px 6px;
      margin: .3rem .2rem 0 0;
    }

    /* ── Breakpoints ── */
    .breakpoint-card {
      background: rgba(201,168,76,.05);
      border: 1px solid var(--gold-line);
      border-radius: 8px;
      padding: .9rem 1rem;
      position: relative;
    }
    .breakpoint-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--gold);
      margin-bottom: .3rem;
    }
    .breakpoint-desc { font-size: .83rem; color: var(--ink-dim); }

    /* ── Search & Filters ── */
    .search-bar {
      background: rgba(6,10,20,.8);
      border: 1px solid var(--border-gold);
      border-radius: 8px;
      color: var(--ink);
      font-family: 'Crimson Pro', serif;
      font-size: .95rem;
      padding: .55rem .9rem;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    .search-bar:focus { border-color: var(--gold); }
    .search-bar::placeholder { color: var(--ink-faint); }

    .filter-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: .3rem .8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all .18s;
    }
    .filter-chip:hover { border-color: var(--gold-line); color: var(--gold); }
    .filter-chip.active-attack  { background: rgba(236,72,153,.15); border-color: rgba(236,72,153,.4); color: #f472b6; }
    .filter-chip.active-react   { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.3); color: #34d399; }
    .filter-chip.active-action  { background: rgba(168,85,247,.12); border-color: rgba(168,85,247,.3); color: #c084fc; }
    .filter-chip.active-free    { background: rgba(148,163,184,.1);  border-color: rgba(148,163,184,.3); color: #cbd5e1; }
    .filter-chip.active-cost1   { background: rgba(201,168,76,.14);  border-color: var(--gold-line);    color: var(--gold); }
    .filter-chip.active-cost2   { background: rgba(201,168,76,.14);  border-color: var(--gold-line);    color: var(--gold); }

    /* ── Legend ── */
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 4px; }

    /* ── Sidebar highlight ── */
    .sidebar-link {
      display: block;
      padding: .3rem .5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--ink-faint);
      border-left: 2px solid transparent;
      transition: all .15s;
      cursor: pointer;
    }
    .sidebar-link:hover, .sidebar-link.active { color: var(--gold); border-left-color: var(--gold); }

    /* ── No results ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--ink-faint);
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── Path icon color blobs ── */
    .path-glow { position: absolute; right: -20px; top: -20px; width: 80px; height: 80px; border-radius: 50%; opacity: 0.06; filter: blur(24px); pointer-events: none; }

    /* ── Overview mode ── */
    #overview-pane { display: block; }
    #detail-pane   { display: none; }
    #overview-pane.hidden { display: none; }
    #detail-pane.visible  { display: block; }

    .hero-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
    }
    .hero-label {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: .15rem;
    }

    @media (max-width: 768px) {
      .trait-grid { grid-template-columns: 1fr; }
      .constellation-map { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
 <div id="navbar-placeholder"></div>
 <div style="height:90px;"></div> <!-- spacer for fixed navbar -->
  <!-- Cosmos -->
  <div class="cosmos">
    <div class="nebula"></div>
    <div class="stars layer1"></div>
    <div class="stars layer2"></div>
    <div class="shooting-star s1"></div>
    <div class="shooting-star s2"></div>
    <div class="shooting-star s3"></div>
  </div>

  <!-- NAV -->
     

  <main class="pt-10 pb-24 px-4 md:px-8">

    <!-- Hero Header -->
    <header class="text-center mb-12 max-w-3xl mx-auto">
      <p class="text-xs tracking-widest uppercase mb-3" style="font-family:'JetBrains Mono',monospace;color:var(--gold)">Mythlight / Constellation System</p>
      <h1 class="text-5xl md:text-6xl font-bold text-white mb-4" style="text-shadow:0 0 60px rgba(201,168,76,.2)">Paths &amp; Traits</h1>
      <p class="text-lg" style="color:var(--indigo)">
        Explore every constellation path and its traits. Click a path to dive into its full trait roster.
      </p>
    </header>

    <!-- Stats row -->
    <div class="flex flex-wrap justify-center gap-8 mb-14" id="hero-stats">
      <!-- populated by JS -->
    </div>

    <!-- Action legend -->
    <div class="flex flex-wrap justify-center gap-4 mb-10">
      <div class="flex items-center gap-2 text-xs" style="color:var(--ink-dim)">
        <span class="legend-dot" style="background:var(--clr-style)"></span>Attack Action ◆
      </div>
      <div class="flex items-center gap-2 text-xs" style="color:var(--ink-dim)">
        <span class="legend-dot" style="background:var(--clr-skill)"></span>Reaction ◇
      </div>
      <div class="flex items-center gap-2 text-xs" style="color:var(--ink-dim)">
        <span class="legend-dot" style="background:var(--clr-mind)"></span>Action ⬖
      </div>
      <div class="flex items-center gap-2 text-xs" style="color:var(--ink-dim)">
        <span class="legend-dot" style="background:var(--clr-free)"></span>Passive / Free ⭘
      </div>
    </div>

    <!-- OVERVIEW PANE -->
    <div id="overview-pane">

      <!-- Search + filters -->
      <div class="max-w-2xl mx-auto mb-10 flex flex-col gap-3">
        <input id="global-search" class="search-bar" placeholder="Search all traits across every path…" oninput="handleGlobalSearch()">
        <div class="flex flex-wrap gap-2 justify-center" id="filter-row">
          <button class="filter-chip" data-filter="action-attack"  onclick="toggleFilter(this,'attack')" >◆ Attack</button>
          <button class="filter-chip" data-filter="action-react"   onclick="toggleFilter(this,'react')"  >◇ Reaction</button>
          <button class="filter-chip" data-filter="action-action"  onclick="toggleFilter(this,'action')" >⬖ Action</button>
          <button class="filter-chip" data-filter="action-free"    onclick="toggleFilter(this,'free')"   >⭘ Passive</button>
          <button class="filter-chip" data-filter="cost-1"         onclick="toggleFilter(this,'cost1')"  >1 TP</button>
          <button class="filter-chip" data-filter="cost-2"         onclick="toggleFilter(this,'cost2')"  >2 TP</button>
        </div>
      </div>

      <!-- Global search results (hidden by default) -->
      <div id="global-results" class="hidden max-w-7xl mx-auto mb-12">
        <div id="global-results-header" class="mb-4 text-xs tracking-widest uppercase" style="font-family:'JetBrains Mono',monospace;color:var(--ink-faint)"></div>
        <div id="global-results-grid" class="trait-grid"></div>
      </div>

      <!-- Constellation map -->
      <div id="map-wrap" class="max-w-7xl mx-auto mb-6">
        <h2 class="text-xs tracking-widest uppercase mb-4" style="font-family:'JetBrains Mono',monospace;color:var(--ink-faint)">
          All Constellation Paths — click to explore
        </h2>
        <div class="constellation-map" id="path-map"></div>
      </div>

    </div>
    <!-- END OVERVIEW -->

    <!-- DETAIL PANE -->
    <div id="detail-pane">
      <div class="max-w-7xl mx-auto">

        <!-- Back button + path header -->
        <div class="flex items-start gap-4 mb-8 flex-wrap">
          <button onclick="backToOverview()" class="flex items-center gap-2 text-xs tracking-widest uppercase px-4 py-2 rounded-lg transition-all" style="font-family:'JetBrains Mono',monospace;border:1px solid var(--gold-line);background:var(--gold-dim);color:var(--gold)">
            ← All Paths
          </button>
          <div>
            <h1 class="text-3xl md:text-4xl font-bold text-white" id="detail-path-name"></h1>
            <p class="text-xs mt-1" style="font-family:'JetBrains Mono',monospace;color:var(--ink-faint)" id="detail-path-meta"></p>
          </div>
        </div>

        <div class="grid md:grid-cols-12 gap-8">
          <!-- Sidebar: breakpoints + nav -->
          <aside class="md:col-span-3">
            <div class="sticky top-28 flex flex-col gap-4">

              <!-- Breakpoints -->
              <div id="detail-breakpoints" class="flex flex-col gap-3"></div>

              <!-- Trait nav -->
              <div class="mt-2">
                <p class="text-xs tracking-widest uppercase mb-2" style="font-family:'JetBrains Mono',monospace;color:var(--ink-faint)">Traits in this path</p>
                <div id="trait-nav" class="flex flex-col gap-0.5 max-h-72 overflow-y-auto pr-1"></div>
              </div>

              <!-- Detail search -->
              <input id="detail-search" class="search-bar text-sm mt-2" placeholder="Filter traits…" oninput="filterDetailTraits()">
            </div>
          </aside>

          <!-- Main: trait cards -->
          <div class="md:col-span-9">
            <div id="detail-trait-grid" class="trait-grid"></div>
          </div>
        </div>

      </div>
    </div>
    <!-- END DETAIL -->

  </main>

  <!-- Footer -->
  
    <div id="footer-placeholder"></div>

<script>
// ── Data (inlined) ──────────────────────────────────────────────────────────
const PATHS_DATA = [];
const TRAITS_DATA = [];
// ── State ──────────────────────────────────────────────────────────────────
let activeFilters = new Set();
let currentPathId = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function getAction(sym) {
  if (sym === '◆') return 'attack';
  if (sym === '◇') return 'react';
  if (sym === '⬖') return 'action';
  return 'free';
}
function getActionLabel(sym) {
  if (sym === '◆') return 'Attack';
  if (sym === '◇') return 'Reaction';
  if (sym === '⬖') return 'Action';
  return 'Passive';
}
function getBadgeClass(sym) {
  const a = getAction(sym);
  if (a === 'attack') return 'badge-attack';
  if (a === 'react')  return 'badge-react';
  if (a === 'action') return 'badge-action';
  return 'badge-free';
}
function getPathTraits(pathId) {
  const seen = new Set();
  return TRAITS_DATA.filter(t => {
    if (t.Path !== pathId) return false;
    if (seen.has(t.Name)) return false;
    seen.add(t.Name);
    return true;
  });
}

// ── Hero Stats ─────────────────────────────────────────────────────────────
function buildHeroStats() {
  const totalPaths = PATHS_CATALOG.length;
  const totalTraits = (() => { const s = new Set(); TRAITS_DATA.forEach(t => s.add(t.Name)); return s.size; })();
  const totalBreakpoints = PATHS_CATALOG.reduce((n, p) => n + Object.keys(p.breakpoints || {}).length, 0);
  const el = document.getElementById('hero-stats');
  el.innerHTML = [
    [totalPaths, 'Constellation Paths'],
    [totalTraits, 'Unique Traits'],
    [totalBreakpoints, 'Path Breakpoints'],
    ['∞', 'Build Combinations'],
  ].map(([n, l]) => `
    <div class="text-center px-6">
      <div class="hero-stat">${n}</div>
      <div class="hero-label">${l}</div>
    </div>
  `).join('');
}

// ── Convenience alias ──────────────────────────────────────────────────────
const PATHS_CATALOG = PATHS_DATA;

// ── Path Map ───────────────────────────────────────────────────────────────
function buildPathMap() {
  const map = document.getElementById('path-map');
  map.innerHTML = '';
  PATHS_CATALOG.forEach(path => {
    const traits = getPathTraits(path.ID);
    const btn = document.createElement('button');
    btn.className = 'path-card';
    btn.dataset.pathId = path.ID;
    btn.onclick = () => openPath(path.ID);
    btn.innerHTML = `
      <div class="path-glow" style="background:var(--gold)"></div>
      <div class="path-card-name">
        <span class="path-card-dot"></span>${path.name.replace('Path of the ', '').replace('Path of ', '').replace('Path of', '')}
      </div>
      <div class="path-card-count">${traits.length} trait${traits.length !== 1 ? 's' : ''} · ${Object.keys(path.breakpoints || {}).length} breakpoint${Object.keys(path.breakpoints || {}).length !== 1 ? 's' : ''}</div>
    `;
    map.appendChild(btn);
  });
}

// ── Build Trait Card HTML ──────────────────────────────────────────────────
function buildTraitCard(trait) {
  const action = getAction(trait.Action);
  const hasPrereqs = trait.Parameters && trait.Parameters.trim();
  const prereqTags = hasPrereqs
    ? trait.Parameters.split(/[&,]/).map(s => s.trim()).filter(Boolean).map(p => `<span class="prereq-tag">${p}</span>`).join('')
    : '';
  const scalingHtml = trait.Scaling
    ? `<div class="trait-scaling">${trait.Scaling}</div>`
    : '';
  return `
    <div class="trait-card" data-action="${action}" data-cost="${trait.Cost}" data-name="${trait.Name.toLowerCase()}" data-desc="${trait.Description.toLowerCase()}">
      <div class="trait-header">
        <div class="trait-name">${trait.Name}</div>
        <span class="action-badge ${getBadgeClass(trait.Action)}">${trait.Action} ${getActionLabel(trait.Action)}</span>
      </div>
      <div class="cost-pip">★ ${trait.Cost} TP</div>
      <div class="trait-desc">${trait.Description}</div>
      ${prereqTags ? `<div class="mt-1">${prereqTags}</div>` : ''}
      ${scalingHtml}
    </div>
  `;
}

// ── Open Path ──────────────────────────────────────────────────────────────
function openPath(pathId) {
  currentPathId = pathId;
  const path = PATHS_CATALOG.find(p => p.ID === pathId);
  if (!path) return;
  const traits = getPathTraits(pathId);

  document.getElementById('overview-pane').classList.add('hidden');
  const dp = document.getElementById('detail-pane');
  dp.classList.add('visible');

  document.getElementById('detail-path-name').textContent = path.name;
  document.getElementById('detail-path-meta').textContent =
    `${traits.length} trait${traits.length !== 1 ? 's' : ''} · ${Object.keys(path.breakpoints || {}).length} breakpoint${Object.keys(path.breakpoints || {}).length !== 1 ? 's' : ''}`;

  // Breakpoints
  const bpEl = document.getElementById('detail-breakpoints');
  const bps = Object.values(path.breakpoints || {});
  if (bps.length) {
    bpEl.innerHTML = bps.map(b => `
      <div class="breakpoint-card">
        <div class="breakpoint-label">⬡ ${b.investment} Traits Invested</div>
        <div class="breakpoint-desc">${b.description}</div>
      </div>
    `).join('');
  } else {
    bpEl.innerHTML = '<div class="text-xs" style="color:var(--ink-faint)">No breakpoints for this path.</div>';
  }

  // Trait nav
  const navEl = document.getElementById('trait-nav');
  navEl.innerHTML = traits.map(t => `
    <button class="sidebar-link" onclick="scrollToTrait('${t.ID}')">${t.Name}</button>
  `).join('');

  // Trait grid
  const grid = document.getElementById('detail-trait-grid');
  grid.innerHTML = traits.map(t => `<div id="tc-${t.ID}">${buildTraitCard(t)}</div>`).join('');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollToTrait(id) {
  const el = document.getElementById('tc-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Filter detail traits ───────────────────────────────────────────────────
function filterDetailTraits() {
  const q = document.getElementById('detail-search').value.toLowerCase();
  document.querySelectorAll('#detail-trait-grid > div').forEach(wrapper => {
    const card = wrapper.querySelector('.trait-card');
    if (!card) return;
    const name = card.dataset.name || '';
    const desc = card.dataset.desc || '';
    wrapper.style.display = (!q || name.includes(q) || desc.includes(q)) ? '' : 'none';
  });
  // Update nav active
  document.querySelectorAll('#trait-nav .sidebar-link').forEach(link => {
    const name = link.textContent.toLowerCase();
    link.classList.toggle('active', !!q && name.includes(q));
  });
}

// ── Back to Overview ───────────────────────────────────────────────────────
function backToOverview() {
  currentPathId = null;
  document.getElementById('overview-pane').classList.remove('hidden');
  document.getElementById('detail-pane').classList.remove('visible');
  document.getElementById('detail-search').value = '';
}

// ── Global Search ──────────────────────────────────────────────────────────
function handleGlobalSearch() {
  const q = document.getElementById('global-search').value.toLowerCase().trim();
  const resultsWrap = document.getElementById('global-results');
  const header = document.getElementById('global-results-header');
  const grid = document.getElementById('global-results-grid');

  if (!q && activeFilters.size === 0) {
    resultsWrap.classList.add('hidden');
    return;
  }

  resultsWrap.classList.remove('hidden');

  const seen = new Set();
  const matched = TRAITS_DATA.filter(t => {
    if (seen.has(t.Name)) return false;
    const matchQ = !q || t.Name.toLowerCase().includes(q) || t.Description.toLowerCase().includes(q);
    const action = getAction(t.Action);
    const cost = parseInt(t.Cost);
    let matchFilter = true;
    if (activeFilters.size > 0) {
      const actionFilters = [...activeFilters].filter(f => ['attack','react','action','free'].includes(f));
      const costFilters = [...activeFilters].filter(f => ['cost1','cost2'].includes(f));
      const actionPass = actionFilters.length === 0 || actionFilters.includes(action);
      const costPass = costFilters.length === 0 || (costFilters.includes('cost1') && cost === 1) || (costFilters.includes('cost2') && cost === 2);
      matchFilter = actionPass && costPass;
    }
    if (matchQ && matchFilter) { seen.add(t.Name); return true; }
    return false;
  });

  header.textContent = `${matched.length} trait${matched.length !== 1 ? 's' : ''} found`;
  grid.innerHTML = matched.length
    ? matched.map(t => buildTraitCard(t)).join('')
    : `<div class="no-results">No traits match your query</div>`;
}

// ── Filter Chips ───────────────────────────────────────────────────────────
function toggleFilter(btn, type) {
  const activeClass = `active-${type}`;
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.className = 'filter-chip';
  } else {
    activeFilters.add(type);
    btn.classList.add(activeClass);
  }
  handleGlobalSearch();
}


async function fetchData() {
  try {
    const response = await fetch('../json/paths_traits.json');

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    // Clear existing arrays while preserving references
    PATHS_DATA.length = 0;
    TRAITS_DATA.length = 0;

    // Populate arrays
    PATHS_DATA.push(...(data.paths || []));
    TRAITS_DATA.push(...(data.traits || []));

    // Build page
    buildHeroStats();
    buildPathMap();

    console.log(
      `Loaded ${PATHS_DATA.length} paths and ${TRAITS_DATA.length} traits`
    );

  } catch (err) {
    console.error('Failed to load paths_traits.json:', err);

    document.getElementById('path-map').innerHTML = `
      <div class="no-results">
        Failed to load data.<br>
        Check console for details.
      </div>
    `;
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
window.onload = function () {
  fetchData();
};
