<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythlight RPG | Species Template</title>
    <link rel="icon" type="image/svg+xml" href="../../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .species-page {
            position: relative;
        }

        .species-page::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.14), transparent 45%),
                        radial-gradient(circle at 80% 75%, rgba(239, 68, 68, 0.08), transparent 40%);
            z-index: 0;
        }

        .species-page > * {
            position: relative;
            z-index: 1;
        }

        .species-page header h1 {
            text-shadow: 0 8px 22px rgba(2, 6, 23, 0.65);
        }

        .species-page section {
            box-shadow: 0 16px 38px rgba(2, 6, 23, 0.28);
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
        }

        .species-page section:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 44px rgba(2, 6, 23, 0.35);
            border-color: rgba(129, 140, 248, 0.3) !important;
        }

        .species-page img {
            box-shadow: 0 12px 26px rgba(2, 6, 23, 0.42);
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        @media (max-width: 900px) {
            .species-page div[style*='display:flex;gap:2rem;align-items:flex-start'] {
                flex-direction: column;
            }

            .species-page img {
                width: min(100%, 380px) !important;
            }
        }

        .placeholder-card {
            border: 1px dashed rgba(148, 163, 184, 0.35);
            background: rgba(15, 23, 42, 0.35);
            border-radius: 12px;
        }

        .placeholder-line {
            height: 12px;
            border-radius: 8px;
            background: rgba(148, 163, 184, 0.25);
        }
    </style>
</head>

<body class="min-h-screen bg-custom-dark text-slate-300 relative">

    <div id="navbar-placeholder"></div>\n    <div class="cosmos">\n        <div class="nebula"></div>\n\n        <div class="stars layer1"></div>\n        <div class="stars layer2"></div>\n        <div class="stars layer3"></div>\n\n        <div class="shooting-star s1"></div>\n        <div class="shooting-star s2"></div>\n        <div class="shooting-star s3"></div>\n    </div>

    <main class="species-page"
        style="padding-top:8rem;padding-bottom:5rem;max-width:1100px;margin:0 auto;padding-left:1.5rem;padding-right:1.5rem;">

        <!-- HEADER -->
        <header style="margin-bottom:3rem;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:1.5rem;">
            <h1 style="font-size:3.5rem;font-weight:800;color:white;letter-spacing:0.05em;"></h1>
            <h2 style="font-size:1.4rem;color:#a5b4fc;margin-top:0.5rem;font-weight:500;"></h2>
        </header>

        <div style="display:flex;flex-direction:column;gap:3rem;">

            <!-- OVERVIEW -->
            <section
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">
                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">Overview</h3>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:92%;"></div>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:88%;"></div>
                <div class="placeholder-line" style="width:64%;"></div>
            </section>

            <!-- APPEARANCE -->
            <section
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">

                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">Appearance</h3>
                <div style="display:flex;gap:2rem;align-items:flex-start;margin-bottom:3rem;">
                    <div class="placeholder-card" style="width:280px;height:280px;flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:95%;"></div>
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:90%;"></div>
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:86%;"></div>
                        <div class="placeholder-line" style="width:70%;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:2rem;align-items:flex-start;">
                    <div class="placeholder-card" style="width:280px;height:280px;flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:95%;"></div>
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:90%;"></div>
                        <div class="placeholder-line" style="margin-bottom:0.7rem;width:84%;"></div>
                        <div class="placeholder-line" style="width:66%;"></div>
                    </div>
                </div>
            </section>

            <!-- CULTURE -->
            <section class="lore"
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">
                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">Culture</h3>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:94%;"></div>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:90%;"></div>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:87%;"></div>
                <div class="placeholder-line" style="width:72%;"></div>
            </section>

            <!-- STATS -->
            <section
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">
                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">Stats</h3>

                <div class="placeholder-card" style="height:105px;margin-bottom:1.2rem;"></div>

                <div class="placeholder-line" style="margin-bottom:1rem;width:58%;"></div>

                <div style="display:flex;flex-direction:column;gap:0.8rem;">
                    <div class="placeholder-card" style="height:95px;"></div>
                    <div class="placeholder-card" style="height:95px;"></div>
                </div>
            </section>

            <!-- LEGEND -->
            <section
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">
                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">Legend
                </h3>

                <div class="placeholder-line" style="margin-bottom:0.7rem;width:92%;"></div>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:88%;"></div>
                <div class="placeholder-line" style="margin-bottom:0.7rem;width:84%;"></div>
                <div class="placeholder-line" style="width:70%;"></div>
            </section>

            <!-- HISTORY -->
            <section
                style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.8rem;">
                <h3 style="font-size:1.6rem;font-weight:700;color:white;margin-bottom:1rem;">History</h3>

                <div
                    style="border-left:2px solid rgba(255,255,255,0.15);padding-left:1.2rem;display:flex;flex-direction:column;gap:1.5rem;">
                    <div class="placeholder-line" style="width:74%;"></div>
                    <div class="placeholder-line" style="width:82%;"></div>
                    <div class="placeholder-line" style="width:68%;"></div>
                </div>
            </section>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script id="ml-layout" src="../../dyn/layout.js" data-base="../.." defer></script>
</body>

</html>
