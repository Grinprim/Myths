<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myths</title>
    <link rel="icon" type="image/svg+xml" href="./Myths/Assets/img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./Myths/Assets/css/styles.css">
</head>
<body class="bg-custom-dark text-slate-300">

    <header id="hero-header" class="relative min-h-screen flex items-start justify-center overflow-hidden hero-gradient">
        <canvas id="starCanvas" class="absolute inset-0 pointer-events-none" data-click-burst="off"></canvas>

        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-amber-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-orange-600/10 rounded-full blur-[120px]"></div>

        <div class="relative z-10 text-center px-6 max-w-4xl w-full pt-24 md:pt-20 pb-6">
            <div class="mb-5 select-none">
                <span class="text-4xl md:text-5xl font-bold tracking-[0.4em] text-white fantasy-font block logo-glow">MYTHS</span>
                <div class="h-px w-32 bg-gradient-to-r from-transparent via-amber-500 to-transparent mx-auto mt-4 opacity-50"></div>
            </div>

            <h1 class="text-4xl md:text-6xl font-bold text-white mb-4 leading-tight tracking-tight select-none">
                Choose Your Realm in <br><span class="text-amber-400">Myths</span>
            </h1>
            <p class="text-base md:text-lg text-slate-400 mb-6 max-w-2xl mx-auto leading-relaxed select-none">
                Choose a destination and begin your journey.
            </p>

            <div id="portal-orbit" class="mx-auto mb-4"></div>
        </div>
    </header>
    <script src="./Mythlight/Assets/dyn/starfield.js" defer></script>
    <script src="./Myths/Assets/dyn/effect.js" defer></script>
</body>
</html>
