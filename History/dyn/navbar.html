<style>
  .hidden { display: none !important; }

  @media (min-width: 768px) {
    .md\:hidden { display: none !important; }
    .md\:flex { display: flex !important; }
  }

  :root {
    --nav-height: 72px;
    --nav-text-muted: #c4948e;
    --nav-text-bright: #ffe9e6;
    --nav-accent: #c43a2f;
    --nav-bg-dark: rgba(17,7,7,0.92);
    --nav-bg-light: rgba(17,7,7,0.78);
    --nav-border: rgba(196,58,47,0.22);
    --nav-hover-bg: rgba(196,58,47,0.15);
    --nav-active-bg: rgba(196,58,47,0.22);
  }

  nav.nav-container[data-theme="solar-system"] {
    --nav-text-muted: #7a9cc4;
    --nav-text-bright: #e6f0ff;
    --nav-accent: #4488ff;
    --nav-bg-dark: rgba(2,8,16,0.92);
    --nav-bg-light: rgba(5,13,26,0.78);
    --nav-border: rgba(42,90,176,0.22);
    --nav-hover-bg: rgba(68,136,255,0.14);
    --nav-active-bg: rgba(68,136,255,0.22);
  }

  nav.nav-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 50;
    background: linear-gradient(180deg, var(--nav-bg-dark) 0%, var(--nav-bg-light) 100%);
    border-bottom: 1px solid var(--nav-border);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    transition: all 250ms ease;
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem;
    min-height: var(--nav-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .nav-logo-text {
    color: var(--nav-text-bright);
    font-size: 0.95rem;
    letter-spacing: 0.16em;
    font-weight: 700;
    text-transform: uppercase;
  }

  .nav-links {
    display: none;
    align-items: center;
    gap: 1rem;
  }

  .nav-link, .mobile-link {
    color: var(--nav-text-muted);
    text-decoration: none;
    padding: 0.45rem 0.85rem;
    border-radius: 0.375rem;
    transition: all 180ms ease;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: relative;
  }

  .nav-link:hover, .mobile-link:hover {
    color: var(--nav-text-bright);
    background: var(--nav-hover-bg);
  }

  .nav-link.active, .mobile-link.active {
    color: var(--nav-text-bright);
    background: var(--nav-active-bg);
    border-bottom: 2px solid var(--nav-accent);
  }

  .nav-back-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.45rem 0.95rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--nav-text-bright);
    background: linear-gradient(135deg, rgba(196,58,47,0.22), rgba(196,58,47,0.08));
    border: 1px solid rgba(196,58,47,0.35);
    border-radius: 999px;
    text-decoration: none;
    transition: all 180ms ease;
    gap: 0.4rem;
  }

  nav.nav-container[data-theme="solar-system"] .nav-back-button {
    background: linear-gradient(135deg, rgba(68,136,255,0.22), rgba(68,136,255,0.08));
    border: 1px solid rgba(68,136,255,0.35);
  }

  .nav-back-button:hover {
    color: var(--nav-text-bright);
    background: linear-gradient(135deg, rgba(196,58,47,0.45), rgba(196,58,47,0.2));
    border-color: rgba(196,58,47,0.7);
    transform: translateX(-1px);
  }

  nav.nav-container[data-theme="solar-system"] .nav-back-button:hover {
    background: linear-gradient(135deg, rgba(68,136,255,0.45), rgba(68,136,255,0.2));
    border-color: rgba(68,136,255,0.7);
  }

  #mobile-menu {
    position: absolute;
    top: var(--nav-height);
    left: 0;
    width: 100%;
    background: rgba(17,7,7,0.96);
    border-top: 1px solid var(--nav-border);
    backdrop-filter: blur(16px);
    transition: all 250ms ease;
  }

  nav.nav-container[data-theme="solar-system"] #mobile-menu {
    background: rgba(2,8,16,0.96);
  }

  .mobile-link {
    padding: 0.75rem 1.5rem;
    display: block;
    border-left: 3px solid transparent;
    transition: all 180ms ease;
    color: var(--nav-text-muted);
  }

  .mobile-link:hover {
    background: var(--nav-hover-bg);
    border-left-color: var(--nav-accent);
  }

  .mobile-link.active {
    background: var(--nav-active-bg);
    border-left-color: var(--nav-accent);
  }

  @media (min-width: 768px) {
    .nav-links {
      display: flex;
    }
    #mobile-menu-btn {
      display: none;
    }
    #mobile-menu {
      display: none !important;
    }
  }
</style>

<nav class="nav-container">
  <div class="nav-inner">
    <span class="nav-logo-text">The Lore of the World</span>

    <div id="nav-links" class="nav-links">
      <a href="#" class="nav-link" data-nav-route="index">Timeline</a>
      <a href="#" class="nav-link" data-nav-route="solar-system">Solar System</a>
      <a href="#" class="nav-back-button" data-nav-route="myths">← Back to Myths</a>
    </div>

    <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none" aria-label="Open navigation menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div id="mobile-menu" class="hidden">
    <div class="flex flex-col text-sm font-semibold uppercase tracking-widest">
      <a href="#" class="mobile-link" data-nav-route="index">Timeline</a>
      <a href="#" class="mobile-link" data-nav-route="solar-system">Solar System</a>
      <a href="#" class="mobile-link" data-nav-route="myths">← Back to Myths</a>
    </div>
  </div>
</nav>
