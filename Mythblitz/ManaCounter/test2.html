<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Game Counter</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

:root{
  --glass-border: rgba(255,255,255,0.1);
  --glass-bg: rgba(15,23,42,0.6);
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  color: #cbd5e1;
  background: radial-gradient(circle at 20% 20%, rgba(16,185,129,0.2), transparent 45%),
              radial-gradient(circle at 80% 20%, rgba(34,197,94,0.14), transparent 45%),
              radial-gradient(circle at 50% 80%, rgba(20,184,166,0.12), transparent 45%),
              #0b1a12;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
  height: calc(100vh - 80px);
}

.player {
  border-radius: 18px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border: 0px solid var(--glass-border);
  backdrop-filter: blur(6px);
}

.header {
  text-align: center;
  color: white;
  font-family: 'Cinzel', serif;
  font-size: 20px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7); /* stronger for readability */
}

.stat-row {
  display: inline-grid; /* shrink to content */
  grid-template-columns: auto auto auto;
  align-items: center;
  gap: 6px;
  justify-content: center;
  margin: 0 auto; /* center the whole row */
}

.value {
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  min-width: 64px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7); /* stronger for readability */
}

.label {
  text-align: center;
  font-size: 15px;
  opacity: 0.6;
  color: #fff;
   text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7); /* stronger for readability */
}

button {
  border: 0px solid var(--glass-border);
  border-radius: 9px;
  background: rgba(39, 39, 39, 0.226);
  color: #fff;
  padding: 12px 6px; /* slightly bigger */
  font-size: 15px;
  width: 34px; /* slightly wider */
  flex-shrink: 0;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7); /* stronger for readability */
}

button:active {
  background: rgba(255,255,255,0.2);
}

button:active {
  background: rgba(255,255,255,0.2);
}

button:active {
  background: rgba(255,255,255,0.2);
}

#hp-controls, #player-controls {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  background: var(--glass-bg);
  padding: 16px;
  border-radius: 16px;
  z-index: 1000;
  border: 1px solid var(--glass-border);
  box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
  gap: 10px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap; /* prevents scrunching */
}

#hp-controls button, #player-controls button {
  width: auto; /* override narrow buttons */
  padding: 10px 14px;
  font-size: 14px;
}

/* top toggle buttons */
body > button {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1100;

  width: auto; /* not narrow */
  padding: 10px 16px;
  font-size: 14px;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 12px;
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 20px -10px rgba(0,0,0,0.6);
}

body > button:nth-of-type(1) { top: 10px; }
body > button:nth-of-type(2) { top: 52px; }

</style>
</head>
<body>

<div id="hp-controls">
  <button onclick="setAllHP(12)">12</button>
  <button onclick="setAllHP(24)">24</button>
  <button onclick="setAllHP(48)">48</button>
</div>
<button onclick="toggleHPControls()" style="position:fixed;top:10px;left:50%;transform:translateX(-50%);">HP</button>

<div id="player-controls">
  <button onclick="addPlayer()">+ Player</button>
  <button onclick="removePlayer()">- Player</button>
</div>
<button onclick="togglePlayerControls()" style="position:fixed;top:50px;left:50%;transform:translateX(-50%);">Players</button>

<div class="container" id="container"></div>

<script>
var playerCount = 0;

function randomGradient() {
  var hue = Math.floor(Math.random() * 360);
  var hue2 = (hue + 20) % 360;
  return 'linear-gradient(135deg, hsl(' + hue + ',70%,60%), hsl(' + hue2 + ',70%,45%))';
}

function createPlayer() {
  var id = playerCount++;

  var colors = [
    {name:'arcane', color:'linear-gradient(135deg, #60a5fa, #1e3a8a)'},
    {name:'occult', color:'linear-gradient(135deg, #4ade80, #14532d)'},
    {name:'divine', color:'linear-gradient(135deg, #fefce8, #fde68a)'},
    {name:'cosmic', color:'linear-gradient(135deg, #c084fc, #4c1d95)'},
    {name:'elemental', color:'linear-gradient(135deg, #f87171, #7f1d1d)'}
  ];

  var randomTheme = colors[Math.floor(Math.random()*colors.length)];

  var player = { id, maxHP: 24, hp: 24, mana: 0, turn: 0, color: randomTheme.color, theme: randomTheme.name };

  var el = document.createElement("div");
  el.className = "player";
  el.id = "player-" + id;
  el.style.background = player.color;
  el.style.boxShadow = '0 10px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.3)';

  el.innerHTML =
    '<div class="header" onclick="toggleColorPicker(' + id + ')">Player ' + (id + 1) + '</div>' +

    '<div class="color-picker" id="color-' + id + '"></div>' +

    '<div class="stat-row">' +
      '<button onclick="changeHP(' + id + ',-1)">-</button>' +
      '<div><div class="value" id="hp-' + id + '"></div><div class="label">HP</div></div>' +
      '<button onclick="changeHP(' + id + ',1)">+</button>' +
    '</div>' +

    '<div class="stat-row">' +
      '<button onclick="changeMana(' + id + ',-1)">-</button>' +
      '<div><div class="value" id="mana-' + id + '"></div><div class="label">Mana</div></div>' +
      '<button onclick="changeMana(' + id + ',1)">+</button>' +
    '</div>' +

    '<div class="stat-row">' +
      '<button onclick="changeTurn(' + id + ',-1)">-</button>' +
      '<div><div class="value" id="turn-' + id + '"></div><div class="label">Turns</div></div>' +
      '<button onclick="changeTurn(' + id + ',1)">+</button>' +
    '</div>' +

    '<div class="stat-row">' +
      '<button onclick="resetPlayer(' + id + ')">⟲</button>' +
      '<div></div>' +
      '<button onclick="refillPlayer(' + id + ')">✦</button>' +
    '</div>';

  document.getElementById("container").appendChild(el);
  window['player' + id] = player;

  createColorOptions(id);
  update(id);
}

function createColorOptions(id) {
  var colors = [
    {name:'arcane', color:'linear-gradient(135deg, #60a5fa, #1e3a8a)'},
    {name:'occult', color:'linear-gradient(135deg, #4ade80, #14532d)'},
    {name:'divine', color:'linear-gradient(135deg, #fefce8, #fde68a)'},
    {name:'cosmic', color:'linear-gradient(135deg, #c084fc, #4c1d95)'},
    {name:'elemental', color:'linear-gradient(135deg, #f87171, #7f1d1d)'}
  ];

  var container = document.getElementById('color-' + id);
  container.style.display = 'none';
  container.style.position = 'absolute';
  container.style.top = '30px';
  container.style.left = '50%';
  container.style.transform = 'translateX(-50%)';
  container.style.background = 'rgba(15,23,42,0.95)';
  container.style.padding = '8px';
  container.style.borderRadius = '10px';
  container.style.gap = '6px';
  container.style.boxShadow = '0 10px 25px rgba(0,0,0,0.6)';
  container.style.zIndex = '50';

  colors.forEach(c => {
    var btn = document.createElement('button');
    btn.style.background = c.color;
    btn.style.overflow = 'hidden';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.justifyContent = 'center';
    btn.style.boxShadow = '0 2px 6px rgba(0,0,0,0.6)';
    btn.style.width = '28px';
    btn.style.height = '28px';
    btn.style.borderRadius = '6px';
    btn.onclick = function() { setPlayerColor(id, c); };

    var img = document.createElement('img');
    img.src = c.name + '.png';
    img.style.width = '18px';
    img.style.height = '18px';
    img.style.display = 'block';
    img.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.8))';

    btn.appendChild(img);
    container.appendChild(btn);
  });
}

function toggleColorPicker(id) {
  var el = document.getElementById('color-' + id);
  el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}

function setPlayerColor(id, c) {
  var p = window['player' + id];
  p.theme = c.name;
  document.getElementById('player-' + id).style.background = c.color;
  document.getElementById('color-' + id).style.display = 'none';
}

function update(id) {
  var p = window['player' + id];
  document.getElementById('hp-' + id).innerText = p.hp + '/' + p.maxHP;
  var maxMana = Math.min(12, p.maxHP === 12 ? p.turn * 2 : p.turn);
  document.getElementById('mana-' + id).innerText = p.mana + '/' + maxMana;
  document.getElementById('turn-' + id).innerText = p.turn;
}

function changeHP(id, amount) {
  var p = window['player' + id];
  p.hp = Math.max(0, p.hp + amount);
  update(id);
}

function changeMana(id, amount) {
  var p = window['player' + id];
  var maxMana = Math.min(12, p.maxHP === 12 ? p.turn * 2 : p.turn);
  p.mana = Math.max(0, Math.min(maxMana, p.mana + amount));
  update(id);
}

function changeTurn(id, amount) {
  var p = window['player' + id];
  p.turn = Math.max(0, p.turn + amount);
  update(id);
}

function resetPlayer(id) {
  var p = window['player' + id];
  p.hp = p.maxHP;
  p.turn = 0;
  p.mana = 0;
  update(id);
}

function refillPlayer(id) {
  var p = window['player' + id];
  var maxMana = Math.min(12, p.maxHP === 12 ? p.turn * 2 : p.turn);
  p.mana = maxMana;
  update(id);
}

function setAllHP(value) {
  for (var i = 0; i < playerCount; i++) {
    var p = window['player' + i];
    if (p) {
      p.maxHP = value;
      p.hp = value;
      update(i);
    }
  }
}

function addPlayer() { 
  if (playerCount < 6)
  createPlayer(); }

function removePlayer() {
  if (playerCount <= 1) return;
  playerCount--;
  var el = document.getElementById('player-' + playerCount);
  if (el) el.remove();
  delete window['player' + playerCount];
}

function toggleHPControls() {
  var el = document.getElementById('hp-controls');
  el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
}

function togglePlayerControls() {
  var el = document.getElementById('player-controls');
  el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
}

createPlayer();createPlayer();createPlayer();createPlayer();
</script>

</body>
</html>
