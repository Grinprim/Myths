<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Mythblitz | Card Gallery</title>
	<link rel="icon" type="image/png" href="../img/logo.png" />
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="../css/styles.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #08130f;
			--panel: rgba(12, 22, 18, 0.8);
			--line: rgba(123, 255, 199, 0.2);
			--text: #d9f5e7;
			--muted: #8eb6a4;
			--accent: #22c55e;
			--danger: #ef4444;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			padding-top: 84px;
			min-height: 100vh;
			font-family: 'Inter', sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 10% 0%, rgba(34, 197, 94, 0.16), transparent 45%),
				radial-gradient(circle at 100% 90%, rgba(45, 212, 191, 0.16), transparent 40%),
				var(--bg);
		}

		.page {
			max-width: 1700px;
			margin: 0 auto;
			padding: 28px;
		}

		.topBar {
			display: flex;
			gap: 12px;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
			margin-bottom: 20px;
		}

		.titleWrap h1 {
			margin: 0;
			font-family: 'Cinzel', serif;
			font-size: clamp(26px, 4vw, 38px);
			letter-spacing: 0.06em;
		}

		.titleWrap p {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 14px;
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.btn {
			text-decoration: none;
			border: 1px solid var(--line);
			color: var(--text);
			background: var(--panel);
			padding: 10px 14px;
			border-radius: 10px;
			font-weight: 700;
			cursor: pointer;
		}

		.btnPrimary {
			background: linear-gradient(130deg, #0d261b, #1f7d4c);
			border-color: rgba(34, 197, 94, 0.55);
		}

		.summary {
			margin-bottom: 14px;
			color: var(--muted);
			font-size: 13px;
		}

		.toolbar {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 10px;
			margin-bottom: 16px;
		}

		.control {
			display: grid;
			gap: 6px;
		}

		.control label {
			font-size: 12px;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.select,
		.input {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 10px;
			padding: 10px;
			background: rgba(8, 18, 14, 0.8);
			color: var(--text);
		}

		.iconBtn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 1px solid var(--line);
			border-radius: 10px;
			padding: 10px 12px;
			background: rgba(8, 18, 14, 0.8);
			color: var(--text);
			font-size: 15px;
			cursor: pointer;
		}

		.folderSection {
			margin-bottom: 18px;
			border: 1px solid var(--line);
			border-radius: 12px;
			background: rgba(8, 18, 14, 0.35);
			overflow: hidden;
		}

		.folderHeader {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			padding: 10px 12px;
			cursor: pointer;
			background: rgba(8, 18, 14, 0.75);
			border: 0;
			width: 100%;
			color: var(--text);
			text-align: left;
		}

		.folderTitle {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-weight: 700;
		}

		.folderMeta {
			color: var(--muted);
			font-size: 12px;
		}

		.folderBody {
			padding: 12px;
		}

		.customFolderTools {
			display: grid;
			gap: 10px;
			margin: 0 0 16px;
			padding: 10px;
			border: 1px solid var(--line);
			border-radius: 12px;
			background: rgba(8, 18, 14, 0.45);
		}

		.customFolderTools[hidden] {
			display: none;
		}

		.folderCreateRow {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
		}

		.folderPills {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.folderPill {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 7px 10px;
			border-radius: 999px;
			background: rgba(5, 12, 10, 0.75);
			border: 1px solid var(--line);
			font-size: 12px;
			color: var(--text);
		}

		.folderPill button {
			border: 0;
			border-radius: 999px;
			padding: 2px 6px;
			background: rgba(239, 68, 68, 0.2);
			color: #fecaca;
			cursor: pointer;
			font-size: 11px;
		}

		.hiddenInput {
			display: none;
		}

		.toastHost {
			position: fixed;
			right: 16px;
			bottom: 16px;
			z-index: 1200;
			display: grid;
			gap: 8px;
			pointer-events: none;
		}

		.toast {
			min-width: 220px;
			max-width: 380px;
			padding: 10px 12px;
			border-radius: 10px;
			border: 1px solid var(--line);
			background: rgba(11, 23, 18, 0.94);
			box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
			transform: translateY(8px);
			opacity: 0;
			transition: transform 0.22s ease, opacity 0.22s ease;
		}

		.toast.show {
			transform: translateY(0);
			opacity: 1;
		}

		.toast.error {
			border-color: rgba(239, 68, 68, 0.55);
			color: #fecaca;
		}

		.toast.success {
			border-color: rgba(34, 197, 94, 0.6);
			color: #bbf7d0;
		}

		.modalOverlay {
			position: fixed;
			inset: 0;
			z-index: 1150;
			display: grid;
			place-items: center;
			padding: 20px;
			background: rgba(0, 0, 0, 0.55);
			backdrop-filter: blur(2px);
		}

		.modalCard {
			width: min(520px, 100%);
			border-radius: 12px;
			border: 1px solid var(--line);
			background: rgba(10, 20, 16, 0.95);
			padding: 16px;
		}

		.modalCard h3 {
			margin: 0 0 10px;
			font-size: 18px;
		}

		.modalCard p {
			margin: 0;
			color: var(--muted);
			font-size: 14px;
		}

		.modalActions {
			display: flex;
			gap: 8px;
			justify-content: flex-end;
			flex-wrap: wrap;
			margin-top: 16px;
		}

		.galleryGrid {
			display: grid;
			grid-template-columns: repeat(5, minmax(0, 1fr));
			gap: 14px;
		}

		.cardTile {
			position: relative;
			border: 1px solid var(--line);
			border-radius: 12px;
			overflow: hidden;
			background: rgba(0, 0, 0, 0.35);
			cursor: pointer;
			transform-origin: center;
			transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
		}

		@media (hover: hover) {
			.cardTile:hover {
				transform: perspective(900px) rotateX(4deg) rotateY(-5deg) translateY(-5px) scale(1.03);
				border-color: rgba(123, 255, 199, 0.68);
				box-shadow: 0 0 0 2px rgba(123, 255, 199, 0.32), 0 16px 24px rgba(2, 10, 7, 0.5);
			}
		}

		.preview {
			width: 100%;
			aspect-ratio: 63 / 88;
			background: #0f1f18;
			object-fit: cover;
			display: block;
		}

		.menuWrap {
			position: absolute;
			top: 8px;
			right: 8px;
			z-index: 2;
		}

		.menuBtn {
			width: 30px;
			height: 30px;
			border-radius: 50%;
			border: 1px solid rgba(255, 255, 255, 0.45);
			background: rgba(0, 0, 0, 0.6);
			color: #fff;
			font-size: 16px;
			cursor: pointer;
		}

		.menu {
			position: absolute;
			right: 0;
			top: 36px;
			display: none;
			min-width: 130px;
			border-radius: 8px;
			overflow: hidden;
			border: 1px solid var(--line);
			background: #0b1712;
		}

		.menu.open { display: block; }

		.menu button {
			width: 100%;
			text-align: left;
			border: 0;
			border-bottom: 1px solid rgba(255, 255, 255, 0.06);
			background: transparent;
			color: var(--text);
			padding: 9px 10px;
			cursor: pointer;
			font-size: 13px;
		}

		.menu button:last-child { border-bottom: 0; }
		.menu button.delete { color: #fca5a5; }

		.empty {
			border: 1px dashed var(--line);
			border-radius: 12px;
			padding: 26px;
			text-align: center;
			color: var(--muted);
			background: var(--panel);
		}

		@media (max-width: 1300px) {
			.galleryGrid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
		}

		@media (max-width: 1000px) {
			.galleryGrid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
			.toolbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
		}

		@media (max-width: 700px) {
			.page { padding: 18px; }
			.galleryGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
			.toolbar { grid-template-columns: 1fr; }
			.folderCreateRow { grid-template-columns: 1fr; }
		}
	</style>
</head>
<body>
	<div id="navbar-placeholder"></div>
	<main class="page">
		<div class="topBar">
			<div class="titleWrap">
				<h1>Card Gallery</h1>
				<p>Click a card to edit it again in the card maker.</p>
			</div>
			<div class="actions">
				<a class="btn" href="../cardmaker/card_maker.html">Open Card Maker</a>
				<button id="exportGalleryBtn" type="button" class="btn">Export Gallery</button>
				<button id="importGalleryBtn" type="button" class="btn">Import Gallery</button>
				<a class="btn btnPrimary" href="multy_print.html">Go to Multi Print</a>
			</div>
		</div>

		<div id="summary" class="summary"></div>
		<div class="toolbar">
			<div class="control">
				<label for="folderModeSelect">Folder Mode</label>
				<select id="folderModeSelect" class="select">
					<option value="none">None (Flat Grid)</option>
					<option value="custom">Custom Folders</option>
					<option value="rarity">Rarity</option>
					<option value="type">Type</option>
					<option value="tag">Tags</option>
					<option value="nameInitial">Name Initial</option>
				</select>
			</div>
			<div class="control">
				<label for="sortBySelect">Order By</label>
				<select id="sortBySelect" class="select">
					<option value="updatedAt">Last Updated</option>
					<option value="createdAt">Created Time</option>
					<option value="rarity">Rarity Symbol</option>
					<option value="name">Name</option>
					<option value="tags">Tags</option>
					<option value="type">Type</option>
					<option value="mana">Mana</option>
				</select>
			</div>
			<div class="control">
				<label for="sortDirectionBtn">Direction</label>
				<button id="sortDirectionBtn" type="button" class="iconBtn" title="Toggle ascending or descending order">↓ Desc</button>
			</div>
			<div class="control">
				<label for="searchInput">Filter</label>
				<input id="searchInput" class="input" type="search" placeholder="Search name, tags, type, rarity" />
			</div>
		</div>
		<div id="customFolderTools" class="customFolderTools">
			<div class="folderCreateRow">
				<input id="newFolderNameInput" class="input" type="text" maxlength="40" placeholder="Create folder (example: Deck 1)" />
				<button id="createFolderBtn" type="button" class="btn">Create Folder</button>
			</div>
			<div id="folderPills" class="folderPills"></div>
		</div>
		<input id="importGalleryInput" class="hiddenInput" type="file" accept="application/json,.json" />
		<section id="galleryRoot"></section>
	</main>
	<div id="toastHost" class="toastHost" aria-live="polite"></div>

	<script id="ml-layout" src="../dyn/layout.js" data-base=".." data-root="../.." defer></script>
	<script src="../dyn/card_storage.js"></script>
	<script>
		const galleryRoot = document.getElementById('galleryRoot');
		const summaryEl = document.getElementById('summary');
		const toastHost = document.getElementById('toastHost');
		const exportGalleryBtn = document.getElementById('exportGalleryBtn');
		const importGalleryBtn = document.getElementById('importGalleryBtn');
		const importGalleryInput = document.getElementById('importGalleryInput');
		const folderModeSelect = document.getElementById('folderModeSelect');
		const sortBySelect = document.getElementById('sortBySelect');
		const sortDirectionBtn = document.getElementById('sortDirectionBtn');
		const searchInput = document.getElementById('searchInput');
		const customFolderTools = document.getElementById('customFolderTools');
		const newFolderNameInput = document.getElementById('newFolderNameInput');
		const createFolderBtn = document.getElementById('createFolderBtn');
		const folderPills = document.getElementById('folderPills');
		const storage = window.MythblitzCardStorage;
		const BACKUP_VERSION = 1;
		const UI_STATE_KEY = 'mythblitz.gallery.ui.v1';
		const FOLDERS_KEY = 'mythblitz.gallery.folders.v1';
		const folderOpenState = Object.create(null);
		let uiState = loadUiState();
		let customFolders = loadCustomFolders();

		function loadUiState() {
			try {
				const parsed = JSON.parse(localStorage.getItem(UI_STATE_KEY) || '{}');
				return {
					folderMode: parsed.folderMode || 'none',
					sortBy: parsed.sortBy || 'updatedAt',
					sortDirection: parsed.sortDirection === 'asc' ? 'asc' : 'desc',
					search: typeof parsed.search === 'string' ? parsed.search : ''
				};
			} catch (_err) {
				return {
					folderMode: 'none',
					sortBy: 'updatedAt',
					sortDirection: 'desc',
					search: ''
				};
			}
		}

		function saveUiState() {
			localStorage.setItem(UI_STATE_KEY, JSON.stringify(uiState));
		}

		function loadCustomFolders() {
			try {
				const parsed = JSON.parse(localStorage.getItem(FOLDERS_KEY) || '[]');
				if (!Array.isArray(parsed)) return [];
				return parsed
					.filter((folder) => folder && typeof folder.id === 'string' && typeof folder.name === 'string')
					.map((folder) => ({
						id: folder.id,
						name: folder.name.trim()
					}))
					.filter((folder) => folder.id && folder.name);
			} catch (_err) {
				return [];
			}
		}

		function saveCustomFolders() {
			localStorage.setItem(FOLDERS_KEY, JSON.stringify(customFolders));
		}

		function generateFolderId() {
			return `folder_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
		}

		function getFolderById(folderId) {
			return customFolders.find((folder) => folder.id === folderId) || null;
		}

		function getFolderNameForCard(card) {
			const folder = getFolderById(card.folderId);
			return folder ? folder.name : 'Unassigned';
		}

		function normalizeFolderName(value) {
			return String(value || '').trim().replace(/\s+/g, ' ').slice(0, 40);
		}

		function updateSortDirectionButton() {
			if (!sortDirectionBtn) return;
			sortDirectionBtn.textContent = uiState.sortDirection === 'asc' ? '↑ Asc' : '↓ Desc';
		}

		function getCardForm(card) {
			return (card && card.form && typeof card.form === 'object') ? card.form : {};
		}

		function splitTags(value) {
			return String(value || '')
				.split(',')
				.map((part) => part.trim())
				.filter(Boolean);
		}

		function getRarityRank(value) {
			const rarity = String(value || '').trim();
			const order = {
				Common: 1,
				Uncommon: 2,
				Rare: 3,
				Epic: 4,
				Legendary: 5,
				'Alt Art': 6
			};
			return order[rarity] || 999;
		}

		function getCardSortValue(card, sortBy) {
			const form = getCardForm(card);
			switch (sortBy) {
				case 'name':
					return String(card.name || form.name || '').toLowerCase();
				case 'tags':
					return splitTags(form.tags).join(' ').toLowerCase();
				case 'type':
					return String(form.type || '').toLowerCase();
				case 'mana':
					return Number.parseInt(form.mana || 0, 10) || 0;
				case 'rarity':
					return getRarityRank(form.rarity);
				case 'createdAt':
					return Date.parse(card.createdAt || 0) || 0;
				case 'updatedAt':
				default:
					return Date.parse(card.updatedAt || card.createdAt || 0) || 0;
			}
		}

		function compareCards(a, b) {
			const direction = uiState.sortDirection === 'asc' ? 1 : -1;
			const aValue = getCardSortValue(a, uiState.sortBy);
			const bValue = getCardSortValue(b, uiState.sortBy);

			if (typeof aValue === 'number' && typeof bValue === 'number') {
				if (aValue !== bValue) return (aValue - bValue) * direction;
			} else {
				const textCompare = String(aValue).localeCompare(String(bValue));
				if (textCompare !== 0) return textCompare * direction;
			}

			const fallbackA = String(a.name || '').toLowerCase();
			const fallbackB = String(b.name || '').toLowerCase();
			return fallbackA.localeCompare(fallbackB);
		}

		function getFolderKeysForCard(card) {
			const form = getCardForm(card);
			switch (uiState.folderMode) {
				case 'custom':
					return [getFolderNameForCard(card)];
				case 'rarity':
					return [String(form.rarity || 'Unknown')];
				case 'type':
					return [String(form.type || 'Unknown')];
				case 'tag': {
					const tags = splitTags(form.tags);
					return tags.length ? tags : ['No Tag'];
				}
				case 'nameInitial': {
					const label = String(card.name || form.name || '').trim();
					const initial = label ? label[0].toUpperCase() : '#';
					return [/^[A-Z]$/.test(initial) ? initial : '#'];
				}
				case 'none':
				default:
					return ['All Cards'];
			}
		}

		function buildGroupedCards(cards) {
			const grouped = new Map();
			cards.forEach((card) => {
				getFolderKeysForCard(card).forEach((key) => {
					if (!grouped.has(key)) grouped.set(key, []);
					grouped.get(key).push(card);
				});
			});

			const groups = Array.from(grouped.entries()).map(([name, list]) => ({
				name,
				cards: list.slice().sort(compareCards)
			}));

			if (uiState.folderMode === 'custom') {
				const rank = new Map(customFolders.map((folder, index) => [folder.name, index]));
				groups.sort((a, b) => {
					const aRank = rank.has(a.name) ? rank.get(a.name) : Number.MAX_SAFE_INTEGER;
					const bRank = rank.has(b.name) ? rank.get(b.name) : Number.MAX_SAFE_INTEGER;
					if (aRank !== bRank) return aRank - bRank;
					return a.name.localeCompare(b.name);
				});
			} else {
				groups.sort((a, b) => a.name.localeCompare(b.name));
			}
			return groups;
		}

		async function assignCardToFolder(card, folderId) {
			const nextCard = {
				...card,
				folderId: folderId || '',
				updatedAt: new Date().toISOString()
			};
			await storage.upsertCard(nextCard);
			showToast(folderId ? 'Card moved to folder.' : 'Card removed from folder.', 'success');
			await render();
		}

		async function chooseFolderForCard(card) {
			if (!customFolders.length) {
				showToast('Create at least one folder first.', 'error');
				return;
			}

			const actions = [{ label: 'Cancel', value: '__cancel__' }, { label: 'Unassigned', value: '' }];
			customFolders.forEach((folder) => {
				actions.push({ label: folder.name, value: folder.id });
			});

			const selected = await showChoiceModal({
				title: 'Move Card To Folder',
				message: 'Choose which folder this card should be in.',
				actions
			});

			if (selected === '__cancel__' || selected === null) return;
			await assignCardToFolder(card, selected);
		}

		async function removeFolder(folderId) {
			const folder = getFolderById(folderId);
			if (!folder) return;

			const confirm = await showChoiceModal({
				title: 'Delete Folder',
				message: `Delete "${folder.name}"? Cards in it will become unassigned.`,
				actions: [
					{ label: 'Cancel', value: false },
					{ label: 'Delete Folder', value: true, primary: true }
				]
			});

			if (confirm !== true) return;

			const cards = await storage.getAllCards();
			const nextCards = cards.map((card) => {
				if (card.folderId !== folderId) return card;
				return {
					...card,
					folderId: '',
					updatedAt: new Date().toISOString()
				};
			});

			customFolders = customFolders.filter((item) => item.id !== folderId);
			saveCustomFolders();
			await storage.setAllCards(nextCards);
			showToast('Folder deleted.', 'success');
			await render();
		}

		function renderCustomFolderTools(allCards) {
			if (!customFolderTools || !folderPills) return;
			customFolderTools.hidden = false;

			folderPills.innerHTML = '';
			if (uiState.folderMode !== 'custom') {
				const hint = document.createElement('div');
				hint.className = 'folderMeta';
				hint.textContent = 'Folders are ready. Switch Folder Mode to "Custom Folders" to view grouped folders.';
				folderPills.appendChild(hint);
			}

			if (!customFolders.length) {
				const empty = document.createElement('div');
				empty.className = 'folderMeta';
				empty.textContent = 'No folders yet. Create one, then move cards into it from the card menu.';
				folderPills.appendChild(empty);
				return;
			}

			customFolders.forEach((folder) => {
				const count = allCards.filter((card) => card.folderId === folder.id).length;
				const pill = document.createElement('div');
				pill.className = 'folderPill';
				pill.textContent = `${folder.name} (${count})`;

				const removeBtn = document.createElement('button');
				removeBtn.type = 'button';
				removeBtn.textContent = 'x';
				removeBtn.title = `Delete ${folder.name}`;
				removeBtn.addEventListener('click', (event) => {
					event.stopPropagation();
					removeFolder(folder.id);
				});

				pill.appendChild(removeBtn);
				folderPills.appendChild(pill);
			});
		}

		function matchesSearch(card, searchTerm) {
			if (!searchTerm) return true;
			const form = getCardForm(card);
			const haystack = [
				card.name,
				form.name,
				form.tags,
				form.type,
				form.rarity
			]
				.map((value) => String(value || '').toLowerCase())
				.join(' ');
			return haystack.includes(searchTerm);
		}

		function showToast(message, kind = 'success') {
			if (!toastHost) return;
			const toast = document.createElement('div');
			toast.className = `toast ${kind}`;
			toast.textContent = message;
			toastHost.appendChild(toast);

			requestAnimationFrame(() => {
				toast.classList.add('show');
			});

			setTimeout(() => {
				toast.classList.remove('show');
				setTimeout(() => toast.remove(), 240);
			}, 2700);
		}

		function showChoiceModal({ title, message, actions }) {
			return new Promise((resolve) => {
				const overlay = document.createElement('div');
				overlay.className = 'modalOverlay';

				const card = document.createElement('div');
				card.className = 'modalCard';
				const heading = document.createElement('h3');
				heading.textContent = title;
				const body = document.createElement('p');
				body.textContent = message;
				const actionRow = document.createElement('div');
				actionRow.className = 'modalActions';

				actions.forEach((action) => {
					const btn = document.createElement('button');
					btn.type = 'button';
					btn.className = `btn ${action.primary ? 'btnPrimary' : ''}`.trim();
					btn.textContent = action.label;
					btn.addEventListener('click', () => {
						overlay.remove();
						resolve(action.value);
					});
					actionRow.appendChild(btn);
				});

				overlay.addEventListener('click', (event) => {
					if (event.target !== overlay) return;
					overlay.remove();
					resolve(null);
				});

				card.append(heading, body, actionRow);
				overlay.appendChild(card);
				document.body.appendChild(overlay);
			});
		}

		async function chooseImportMode() {
			return showChoiceModal({
				title: 'Import Gallery Backup',
				message: 'How should this backup be imported?',
				actions: [
					{ label: 'Cancel', value: null },
					{ label: 'Add to Gallery', value: 'merge' },
					{ label: 'Replace Gallery', value: 'replace', primary: true }
				]
			});
		}

		async function confirmDeleteCard() {
			const answer = await showChoiceModal({
				title: 'Delete Card',
				message: 'Delete this card from your gallery?',
				actions: [
					{ label: 'Cancel', value: false },
					{ label: 'Delete', value: true, primary: true }
				]
			});
			return answer === true;
		}

		function normalizeImportedCards(payload) {
			if (Array.isArray(payload)) {
				return payload;
			}
			if (payload && Array.isArray(payload.cards)) {
				return payload.cards;
			}
			throw new Error('Backup file format is not valid.');
		}

		function sanitizeCards(cards) {
			return cards
				.filter((card) => card && typeof card === 'object' && typeof card.id === 'string' && card.id.trim())
				.map((card) => {
					const form = (card.form && typeof card.form === 'object') ? { ...card.form } : {};
					const transform = (card.artTransform && typeof card.artTransform === 'object') ? card.artTransform : {};
					const artScale = form.artScale ?? card.artScale ?? transform.scale;
					const artX = form.artX ?? card.artX ?? transform.x;
					const artY = form.artY ?? card.artY ?? transform.y;

					if (artScale !== undefined) form.artScale = String(artScale);
					if (artX !== undefined) form.artX = String(artX);
					if (artY !== undefined) form.artY = String(artY);

					return {
						...card,
						form,
						artScale: artScale !== undefined ? String(artScale) : card.artScale,
						artX: artX !== undefined ? String(artX) : card.artX,
						artY: artY !== undefined ? String(artY) : card.artY
					};
				});
		}

		function mergeCards(existingCards, importedCards) {
			const byId = new Map();
			existingCards.forEach((card) => byId.set(card.id, card));
			importedCards.forEach((card) => byId.set(card.id, card));
			return Array.from(byId.values());
		}

		function makeBackupFileName() {
			const now = new Date();
			const stamp = now.toISOString().replace(/[:.]/g, '-');
			return `mythblitz-gallery-backup-${stamp}.json`;
		}

		function triggerDownload(fileName, content) {
			const blob = new Blob([content], { type: 'application/json' });
			const url = URL.createObjectURL(blob);
			const a = document.createElement('a');
			a.href = url;
			a.download = fileName;
			document.body.appendChild(a);
			a.click();
			a.remove();
			setTimeout(() => URL.revokeObjectURL(url), 0);
		}

		async function exportGallery() {
			if (!storage) {
				showToast('Storage helper was not loaded, export is unavailable.', 'error');
				return;
			}

			const cards = await storage.getAllCards();
			const payload = {
				format: 'mythblitz-gallery-backup',
				version: BACKUP_VERSION,
				exportedAt: new Date().toISOString(),
				cards
			};

			triggerDownload(makeBackupFileName(), JSON.stringify(payload, null, 2));
			showToast(`Exported ${cards.length} card${cards.length === 1 ? '' : 's'} to backup file.`, 'success');
		}

		function readFileAsText(file) {
			return new Promise((resolve, reject) => {
				const reader = new FileReader();
				reader.onload = () => resolve(String(reader.result || ''));
				reader.onerror = () => reject(reader.error || new Error('Failed reading selected file.'));
				reader.readAsText(file);
			});
		}

		async function importGalleryFromFile(file) {
			if (!storage) {
				showToast('Storage helper was not loaded, import is unavailable.', 'error');
				return;
			}

			if (!file) return;

			try {
				const raw = await readFileAsText(file);
				const parsed = JSON.parse(raw);
				const importedCards = sanitizeCards(normalizeImportedCards(parsed));

				if (!importedCards.length) {
					throw new Error('This backup has no valid cards to import.');
				}

				const mode = await chooseImportMode();
				if (!mode) {
					showToast('Import canceled.', 'error');
					return;
				}

				if (mode === 'replace') {
					await storage.setAllCards(importedCards);
					showToast(`Imported ${importedCards.length} card${importedCards.length === 1 ? '' : 's'} and replaced gallery.`, 'success');
				} else {
					const existingCards = await storage.getAllCards();
					const mergedCards = mergeCards(existingCards, importedCards);
					await storage.setAllCards(mergedCards);
					showToast(`Imported ${importedCards.length} card${importedCards.length === 1 ? '' : 's'} and merged gallery to ${mergedCards.length} total.`, 'success');
				}

				await render();
			} catch (err) {
				console.error('Import failed', err);
				showToast(err && err.message ? err.message : 'Import failed. Please use a valid backup JSON file.', 'error');
			} finally {
				if (importGalleryInput) importGalleryInput.value = '';
			}
		}

		function openEditor(cardId) {
			window.location.href = `../cardmaker/card_maker.html?edit=${encodeURIComponent(cardId)}`;
		}

		function closeAllMenus() {
			document.querySelectorAll('.menu.open').forEach((menu) => menu.classList.remove('open'));
		}

		function buildCardTile(card) {
			const tile = document.createElement('article');
			tile.className = 'cardTile';
			tile.addEventListener('click', () => openEditor(card.id));

			const img = document.createElement('img');
			img.className = 'preview';
			img.alt = card.name || 'Saved card';
			img.src = card.previewDataUrl || card.artDataUrl || '';

			const menuWrap = document.createElement('div');
			menuWrap.className = 'menuWrap';
			menuWrap.addEventListener('click', (event) => event.stopPropagation());

			const menuBtn = document.createElement('button');
			menuBtn.className = 'menuBtn';
			menuBtn.type = 'button';
			menuBtn.textContent = '⋯';

			const menu = document.createElement('div');
			menu.className = 'menu';

			const editBtn = document.createElement('button');
			editBtn.type = 'button';
			editBtn.textContent = 'Edit';
			editBtn.addEventListener('click', () => openEditor(card.id));

			const duplicateBtn = document.createElement('button');
			duplicateBtn.type = 'button';
			duplicateBtn.textContent = 'Duplicate';
			duplicateBtn.addEventListener('click', async () => {
				await storage.duplicateCard(card.id);
				await render();
			});

			const folderBtn = document.createElement('button');
			folderBtn.type = 'button';
			folderBtn.textContent = 'Move Folder';
			folderBtn.addEventListener('click', async () => {
				await chooseFolderForCard(card);
			});

			const deleteBtn = document.createElement('button');
			deleteBtn.type = 'button';
			deleteBtn.className = 'delete';
			deleteBtn.textContent = 'Delete';
			deleteBtn.addEventListener('click', async () => {
				if (!(await confirmDeleteCard())) return;
				await storage.deleteCardById(card.id);
				showToast('Card deleted from gallery.', 'success');
				await render();
			});

			menuBtn.addEventListener('click', () => {
				const isOpen = menu.classList.contains('open');
				closeAllMenus();
				if (!isOpen) menu.classList.add('open');
			});

			menu.append(editBtn, duplicateBtn, folderBtn, deleteBtn);
			menuWrap.append(menuBtn, menu);

			tile.append(menuWrap, img);
			return tile;
		}

		async function render() {
			if (!storage) {
				galleryRoot.innerHTML = '<div class="empty">Storage helper was not loaded.</div>';
				summaryEl.textContent = '';
				return;
			}

			const loadedCards = await storage.getAllCards();
			const searchTerm = String(uiState.search || '').trim().toLowerCase();
			const cards = loadedCards.filter((card) => matchesSearch(card, searchTerm));
			renderCustomFolderTools(loadedCards);

			summaryEl.textContent = `${cards.length} card${cards.length === 1 ? '' : 's'} shown (${loadedCards.length} total)`;

			if (!cards.length) {
				galleryRoot.innerHTML = searchTerm
					? '<div class="empty">No cards match this filter.</div>'
					: '<div class="empty">No cards in your gallery yet. Save one from the card maker.</div>';
				return;
			}

			galleryRoot.innerHTML = '';

			if (uiState.folderMode === 'none') {
				const grid = document.createElement('div');
				grid.className = 'galleryGrid';
				cards.slice().sort(compareCards).forEach((card) => grid.appendChild(buildCardTile(card)));
				galleryRoot.appendChild(grid);
				return;
			}

			const groups = buildGroupedCards(cards);
			groups.forEach((group) => {
				const section = document.createElement('section');
				section.className = 'folderSection';

				const header = document.createElement('button');
				header.type = 'button';
				header.className = 'folderHeader';

				const title = document.createElement('span');
				title.className = 'folderTitle';
				const caret = document.createElement('span');
				caret.textContent = folderOpenState[group.name] === false ? '▸' : '▾';
				const label = document.createElement('span');
				label.textContent = group.name;
				title.append(caret, label);

				const meta = document.createElement('span');
				meta.className = 'folderMeta';
				meta.textContent = `${group.cards.length} card${group.cards.length === 1 ? '' : 's'}`;

				header.append(title, meta);

				const body = document.createElement('div');
				body.className = 'folderBody';
				if (folderOpenState[group.name] === false) {
					body.hidden = true;
				}

				const grid = document.createElement('div');
				grid.className = 'galleryGrid';
				group.cards.forEach((card) => grid.appendChild(buildCardTile(card)));
				body.appendChild(grid);

				header.addEventListener('click', () => {
					const isClosed = body.hidden;
					body.hidden = !isClosed;
					folderOpenState[group.name] = isClosed;
					caret.textContent = isClosed ? '▾' : '▸';
				});

				section.append(header, body);
				galleryRoot.appendChild(section);
			});
		}

		document.addEventListener('click', closeAllMenus);
		if (exportGalleryBtn) {
			exportGalleryBtn.addEventListener('click', () => {
				exportGallery().catch((err) => {
					console.error('Export failed', err);
					showToast('Failed to export gallery backup.', 'error');
				});
			});
		}

		if (importGalleryBtn && importGalleryInput) {
			importGalleryBtn.addEventListener('click', () => {
				importGalleryInput.click();
			});

			importGalleryInput.addEventListener('change', () => {
				const file = importGalleryInput.files && importGalleryInput.files[0];
				importGalleryFromFile(file);
			});
		}

		if (folderModeSelect) {
			folderModeSelect.value = uiState.folderMode;
			folderModeSelect.addEventListener('change', () => {
				uiState.folderMode = folderModeSelect.value;
				saveUiState();
				render();
			});
		}

		if (createFolderBtn && newFolderNameInput) {
			createFolderBtn.addEventListener('click', async () => {
				const name = normalizeFolderName(newFolderNameInput.value);
				if (!name) {
					showToast('Enter a folder name first.', 'error');
					return;
				}

				if (customFolders.some((folder) => folder.name.toLowerCase() === name.toLowerCase())) {
					showToast('That folder already exists.', 'error');
					return;
				}

				customFolders.push({ id: generateFolderId(), name });
				uiState.folderMode = 'custom';
				if (folderModeSelect) folderModeSelect.value = 'custom';
				saveUiState();
				saveCustomFolders();
				newFolderNameInput.value = '';
				showToast('Folder created.', 'success');
				await render();
			});

			newFolderNameInput.addEventListener('keydown', (event) => {
				if (event.key !== 'Enter') return;
				event.preventDefault();
				createFolderBtn.click();
			});
		}

		if (sortBySelect) {
			sortBySelect.value = uiState.sortBy;
			sortBySelect.addEventListener('change', () => {
				uiState.sortBy = sortBySelect.value;
				saveUiState();
				render();
			});
		}

		if (sortDirectionBtn) {
			updateSortDirectionButton();
			sortDirectionBtn.addEventListener('click', () => {
				uiState.sortDirection = uiState.sortDirection === 'asc' ? 'desc' : 'asc';
				updateSortDirectionButton();
				saveUiState();
				render();
			});
		}

		if (searchInput) {
			searchInput.value = uiState.search;
			searchInput.addEventListener('input', () => {
				uiState.search = searchInput.value;
				saveUiState();
				render();
			});
		}

		render().catch((err) => {
			console.error('Gallery render failed', err);
			galleryRoot.innerHTML = '<div class="empty">Failed to load gallery from browser storage.</div>';
			showToast('Failed to load gallery from browser storage.', 'error');
		});
	</script>
</body>
