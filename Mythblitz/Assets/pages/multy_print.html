<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mythblitz | Multi Print</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #09140f;
      --panel: rgba(12, 24, 18, 0.82);
      --line: rgba(124, 255, 201, 0.22);
      --text: #d7f4e6;
      --muted: #95b7a8;
      --accent: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding-top: 84px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 163, 74, 0.2), transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(20, 184, 166, 0.15), transparent 45%),
        var(--bg);
    }

    .page {
      max-width: 1700px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0.05em;
    }

    .sub {
      color: var(--muted);
      margin: 8px 0 20px;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--panel);
      text-decoration: none;
      padding: 10px 13px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .btnPrimary {
      border-color: rgba(22, 163, 74, 0.65);
      background: linear-gradient(130deg, #0f2a1d, #1f7a4a);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .item {
      position: relative;
      border: 1px solid rgba(124, 255, 201, 0.14);
      border-radius: 14px;
      padding: 10px;
      padding-bottom: 42px;
      background: rgba(0, 0, 0, 0.2);
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .cardTile {
      width: 100%;
      border: 1px solid rgba(124, 255, 201, 0.25);
      border-radius: 12px;
      padding: 0;
      color: var(--text);
      background: rgba(0, 0, 0, 0.35);
      display: block;
      text-align: left;
      cursor: pointer;
      transform-origin: center;
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }

    @media (hover: hover) {
      .cardTile:hover {
        transform: perspective(900px) rotateX(4deg) rotateY(-5deg) translateY(-5px) scale(1.03);
        border-color: rgba(123, 255, 199, 0.68);
        box-shadow: 0 0 0 2px rgba(123, 255, 199, 0.32), 0 16px 24px rgba(2, 10, 7, 0.5);
      }
    }

    .item[data-selected="true"] {
      border-color: rgba(73, 214, 147, 0.72);
      box-shadow: 0 0 0 2px rgba(73, 214, 147, 0.2);
    }

    .item[data-selected="true"] .cardTile {
      border-color: rgba(73, 214, 147, 0.88);
      box-shadow: inset 0 0 0 2px rgba(73, 214, 147, 0.18);
    }

    .preview {
      width: 100%;
      aspect-ratio: 63 / 88;
      object-fit: cover;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: #0e1f17;
      display: block;
    }

    .qtyPanel {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translate(-50%, 8px);
      border: 1px solid rgba(124, 255, 201, 0.34);
      border-radius: 10px;
      padding: 0;
      width: 56px;
      height: 0;
      opacity: 0;
      overflow: hidden;
      transition: height 220ms ease, opacity 180ms ease, transform 180ms ease;
      background: rgba(10, 27, 20, 0.9);
      pointer-events: none;
      display: grid;
      place-items: center;
    }

    .item[data-selected="true"] .qtyPanel {
      height: 28px;
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .qtyInput {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 2px 6px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .qtyInput::-webkit-outer-spin-button,
    .qtyInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qtyInput:focus {
      outline: 1px solid rgba(124, 255, 201, 0.58);
      outline-offset: -1px;
    }

    .selectionMeta {
      display: inline-block;
      margin-top: 6px;
      color: #bde8d4;
      font-weight: 600;
    }

    .infoBox {
      margin: 16px 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
    }

    .toastHost {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 90;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      border: 1px solid rgba(124, 255, 201, 0.3);
      background: rgba(8, 26, 19, 0.96);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(8px);
      animation: toastIn 180ms ease forwards;
    }

    .toast.error {
      border-color: rgba(248, 113, 113, 0.55);
      background: rgba(49, 18, 18, 0.95);
    }

    @keyframes toastIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 1000px) {
      .cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { padding: 18px; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="page">
    <h1>Multi Print</h1>
    <p class="sub">Select cards and quantity, then export an A4 PDF using 63 x 88 mm card dimensions.</p>

    <div class="toolbar">
      <a class="btn" href="card_gallery.html">Back to Gallery</a>
      <button class="btn" type="button" id="selectAllBtn">Select All</button>
      <button class="btn" type="button" id="clearBtn">Clear</button>
      <button class="btn btnPrimary" type="button" id="printBtn">Generate PDF</button>
    </div>

    <div class="infoBox">
      Layout: A4 Portrait with cards at 63 x 88 mm.(9 cards per page).
      <div id="selectionMeta" class="selectionMeta">0 cards selected, 0 total copies.</div>
    </div>

    <section id="root"></section>
  </main>
  <div id="uiToastHost" class="toastHost" aria-live="polite"></div>

  <script id="ml-layout" src="../dyn/layout.js" data-base=".." data-root="../.." defer></script>
  <script src="../dyn/card_storage.js"></script>
  <script>
    const storage = window.MythblitzCardStorage;
    const root = document.getElementById('root');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const printBtn = document.getElementById('printBtn');
    const selectionMeta = document.getElementById('selectionMeta');
    const toastHost = document.getElementById('uiToastHost');
    let cachedCards = [];

    function showToast(message, kind = 'info', timeout = 2200) {
      const toast = document.createElement('div');
      toast.className = `toast ${kind}`;
      toast.textContent = message;
      toastHost.appendChild(toast);
      window.setTimeout(() => {
        toast.remove();
      }, timeout);
    }

    function setItemSelected(item, selected, resetQty = true) {
      const qty = item.querySelector('.qtyInput');
      const tile = item.querySelector('.cardTile');
      item.dataset.selected = selected ? 'true' : 'false';
      qty.disabled = !selected;
      tile.setAttribute('aria-pressed', selected ? 'true' : 'false');
      if (!selected && resetQty) qty.value = '1';
    }

    function updateSelectionMeta() {
      let selectedCount = 0;
      let totalCopies = 0;
      document.querySelectorAll('.item').forEach((item) => {
        if (item.dataset.selected !== 'true') return;
        selectedCount += 1;
        const qty = Math.max(1, Math.min(999, Number(item.querySelector('.qtyInput').value) || 1));
        totalCopies += qty;
      });
      selectionMeta.textContent = `${selectedCount} cards selected, ${totalCopies} total copies.`;
    }

    function createItem(card) {
      const item = document.createElement('article');
      item.className = 'item';
      item.dataset.id = card.id;
      item.dataset.selected = 'false';

      const tile = document.createElement('button');
      tile.type = 'button';
      tile.className = 'cardTile';
      tile.setAttribute('aria-pressed', 'false');

      const img = document.createElement('img');
      img.className = 'preview';
      img.src = card.previewDataUrl || card.artDataUrl || '';
      img.alt = card.name || 'Card';

      const qtyPanel = document.createElement('div');
      qtyPanel.className = 'qtyPanel';
      qtyPanel.addEventListener('click', (event) => event.stopPropagation());

      const qty = document.createElement('input');
      qty.type = 'number';
      qty.min = '1';
      qty.max = '999';
      qty.value = '1';
      qty.className = 'qtyInput';
      qty.disabled = true;

      tile.addEventListener('click', () => {
        setItemSelected(item, item.dataset.selected !== 'true', false);
        updateSelectionMeta();
      });

      qty.addEventListener('input', () => {
        const safe = Math.max(1, Math.min(999, Number(qty.value) || 1));
        qty.value = String(safe);
        updateSelectionMeta();
      });

      tile.append(img);
      qtyPanel.append(qty);
      item.append(tile, qtyPanel);
      return item;
    }

    async function render() {
      if (!storage) {
        root.innerHTML = '<div class="empty">Storage helper was not loaded.</div>';
        return;
      }

      const cards = await storage.getAllCards();
      cachedCards = cards;
      if (!cards.length) {
        root.innerHTML = '<div class="empty">No cards found. Save cards from the card maker first.</div>';
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'cards';
      cards.forEach((card) => grid.appendChild(createItem(card)));

      root.innerHTML = '';
      root.appendChild(grid);
      updateSelectionMeta();
    }

    function buildPrintQueue() {
      const selected = [];
      const cardsById = new Map(cachedCards.map((card) => [card.id, card]));

      document.querySelectorAll('.item').forEach((item) => {
        const id = item.dataset.id;
        if (item.dataset.selected !== 'true') return;

        const qtyInput = item.querySelector('.qtyInput');
        const quantity = Math.max(1, Math.min(999, Number(qtyInput.value) || 1));
        const card = cardsById.get(id);
        if (!card) return;

        for (let i = 0; i < quantity; i += 1) {
          selected.push(card);
        }
      });

      return selected;
    }

    function getImageType(dataUrl) {
      if (typeof dataUrl !== 'string') return 'JPEG';
      if (dataUrl.startsWith('data:image/png')) return 'PNG';
      return 'JPEG';
    }

    function generatePdf() {
      const queue = buildPrintQueue();
      if (!queue.length) {
        showToast('Select at least one card to print.', 'error');
        return;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      const pageW = 210;
      const pageH = 297;
      const cardW = 63;
      const cardH = 88;
      const marginX = 5;
      const marginY = 10;
      const gapX = 1;
      const gapY = 1;

      const columns = Math.floor((pageW - (marginX * 2) + gapX) / (cardW + gapX));
      const rows = Math.floor((pageH - (marginY * 2) + gapY) / (cardH + gapY));
      const perPage = columns * rows;

      queue.forEach((card, idx) => {
        if (idx > 0 && idx % perPage === 0) {
          pdf.addPage();
        }

        const pos = idx % perPage;
        const col = pos % columns;
        const row = Math.floor(pos / columns);
        const x = marginX + col * (cardW + gapX);
        const y = marginY + row * (cardH + gapY);

        const source = card.previewDataUrl || card.artDataUrl;
        if (!source) return;

        pdf.addImage(source, getImageType(source), x, y, cardW, cardH, undefined, 'FAST');
      });

      pdf.save('mythblitz_multi_print.pdf');
    }

    selectAllBtn.addEventListener('click', () => {
      document.querySelectorAll('.item').forEach((item) => {
        setItemSelected(item, true, false);
      });
      updateSelectionMeta();
    });

    clearBtn.addEventListener('click', () => {
      document.querySelectorAll('.item').forEach((item) => {
        setItemSelected(item, false, true);
      });
      updateSelectionMeta();
    });

    printBtn.addEventListener('click', generatePdf);
    render().catch((err) => {
      console.error('Multi Print render failed', err);
      root.innerHTML = '<div class="empty">Failed to load cards from browser storage.</div>';
    });
  </script>
</body>
</html>
