<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mythblitz Card Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <header class="appHeader">
    <div class="headerContent">
      <h1 class="appTitle">Mythblitz Card Architect</h1>
      <p class="appSubtitle">Forge your legend.</p>
    </div>
  </header>

  <main class="app">
    <section class="panel" aria-label="Card Settings">
      <form id="cardForm" class="form" autocomplete="off">
        <div class="editorSplit">
          <div class="editorColumn">
            <fieldset class="fieldset coreCardFieldset">
              <legend>Core Card</legend>

              <div class="rowPairWide rowCompact formLine">
                <label class="field">
                  <span class="label">Name</span>
                  <input type="text" id="nameInput" class="input-dark" value="Sample Name" />
                </label>
                <div class="field typeField">
                  <span class="label">Card Type</span>
                  <div class="typeRow">
                    <select id="typeSelect" class="input-dark">
                      <option value="Unit" selected>Unit</option>
                      <option value="Spell">Spell</option>
                      <option value="Landmark">Landmark</option>
                      <option value="Gear">Gear</option>
                    </select>
                    <label class="checkInline typeLightInline" title="Use _light border variant">
                      <input type="checkbox" id="typeLightInput" />
                      <span>Light</span>
                    </label>
                  </div>
                </div>
              </div>

              <div class="rowPairWide rowCompact formLine">
                <label class="field">
                  <span class="label">Tags</span>
                  <input type="text" id="tagsInput" class="input-dark" value="Sample Tags" />
                </label>
                <label class="field">
                  <span class="label">Card Rarity</span>
                  <select id="raritySelect" class="input-dark">
                    <option value="Common">Common</option>
                    <option value="Uncommon">Uncommon</option>
                    <option value="Rare">Rare</option>
                    <option value="Epic">Epic</option>
                    <option value="Legendary">Legendary</option>
                    <option value="Alt Art">Alt Art</option>
                  </select>
                </label>
              </div>

              <div class="rowShort4 rowCompact formLine" id="statsFieldset">
                <label class="field">
                  <span class="label">Mana Cost</span>
                  <input type="number" id="manaInput" class="input-dark" value="1" min="0" max="12" />
                </label>
                <label class="field">
                  <span class="label">Regions</span>
                  <input type="number" id="symbolCountInput" class="input-dark" value="1" min="0" max="5" />
                </label>
                <label class="field isHidden" id="spellSpeedWrap">
                  <span class="label">Spell Speed</span>
                  <select id="spellSpeedSelect" class="input-dark">
                    <option value="Slow" selected>Slow</option>
                    <option value="Fast">Fast</option>
                    <option value="Blitz">Blitz</option>
                  </select>
                </label>

                <label class="field isHidden" id="landmarkTypeWrap">
                  <span class="label">Landmark Type</span>
                  <select id="landmarkTypeSelect" class="input-dark">
                    <option value="Passive" selected>Passive</option>
                    <option value="Reactive">Reactive</option>
                    <option value="Story">Story</option>
                    <option value="Countdown">Countdown</option>
                  </select>
                </label>
                <label class="field" id="mightWrap">
                  <span class="label">Might</span>
                  <input type="number" id="powerInput" class="input-dark" value="1" min="0" max="999" />
                </label>
                <label class="field" id="healthWrap">
                  <span class="label">Health</span>
                  <input type="number" id="healthInput" class="input-dark" value="1" min="1" max="999" />
                </label>
              </div>
                                <div class="manaOptions">
                    <label class="checkInline">
                      <input type="checkbox" id="manaXInput" />
                      <span><b>X</b>: Explain Mana Cost in Description</span>
                    </label>
                  </div>
            </fieldset>

            <fieldset class="fieldset">
              <legend>Text & Art</legend>

              <div class="field">
                <span class="label">Description</span>
                <div class="textTools" role="toolbar" aria-label="Description formatting tools">
                  <button type="button" class="btn btnSecondary textToolBtn" data-wrap-start="[b]" data-wrap-end="[/b]" title="Bold">Bold</button>
                  <button type="button" class="btn btnSecondary textToolBtn" data-wrap-start="[i]" data-wrap-end="[/i]" title="Italic">Italic</button>
                  <button type="button" class="btn btnSecondary textToolBtn" data-wrap-start="[u]" data-wrap-end="[/u]" title="Underline">Underline</button>
                  <button type="button" class="btn btnSecondary textToolBtn" data-insert="[br]" title="Line Break">Line Break</button>
                </div>
                <textarea id="descInput" class="input-dark" placeholder="Supports [b]bold[/b], [i]italic[/i], [u]underline[/u], and [br] line breaks.">Sample Description</textarea>
                <div class="hint">Formatting tags: [b]...[/b], [i]...[/i], [u]...[/u], [br]</div>
              </div>

            </fieldset>
          </div>

          <div class="editorColumn">
            <fieldset class="fieldset">
              <legend>Regions & Slots</legend>

              <label class="field">
                <span class="label">Region 1</span>
                <select id="symbol1Select" class="input-dark">
                  <option value="Arcane">Arcane</option>
                  <option value="Divine">Divine</option>
                  <option value="Elemental">Elemental</option>
                  <option value="Occult">Occult</option>
                  <option value="Cosmic">Cosmic</option>
                </select>
              </label>

              <label class="field isHidden" id="region2Wrap">
                <span class="label">Region 2</span>
                <select id="symbol2Select" class="input-dark"><option value="Arcane">Arcane</option><option value="Divine">Divine</option><option value="Elemental">Elemental</option><option value="Occult">Occult</option><option value="Cosmic">Cosmic</option></select>
              </label>
              <label class="field isHidden" id="region3Wrap">
                <span class="label">Region 3</span>
                <select id="symbol3Select" class="input-dark"><option value="Arcane">Arcane</option><option value="Divine">Divine</option><option value="Elemental">Elemental</option><option value="Occult">Occult</option><option value="Cosmic">Cosmic</option></select>
              </label>
              <label class="field isHidden" id="region4Wrap">
                <span class="label">Region 4</span>
                <select id="symbol4Select" class="input-dark"><option value="Arcane">Arcane</option><option value="Divine">Divine</option><option value="Elemental">Elemental</option><option value="Occult">Occult</option><option value="Cosmic">Cosmic</option></select>
              </label>
              <label class="field isHidden" id="region5Wrap">
                <span class="label">Region 5</span>
                <select id="symbol5Select" class="input-dark"><option value="Arcane">Arcane</option><option value="Divine">Divine</option><option value="Elemental">Elemental</option><option value="Occult">Occult</option><option value="Cosmic">Cosmic</option></select>
              </label>

            </fieldset>

            <fieldset class="fieldset borderPositionFieldset">
              <legend>Border & Positioning</legend>

              <label class="field">
                <span class="label">Description Box Height</span>
                <input type="number" id="descHeightInput" class="input-dark" value="125" min="80" max="220" />
              </label>
              <br>
              <label class="field checkboxField">
                <span class="label">Hide Description</span>
                <input type="checkbox" id="descHideInput" class="checkboxInput" />
              </label>
              <br>
              <label class="field">
                <span class="label">Art</span>
                <input type="file" id="artFile" accept="image/*" />
              </label>
              <label class="field">
                <span class="label">Custom Border Override (Optional)</span>
                <input type="file" id="borderFile" accept="image/*" />
                <div class="hint">Upload a border to override the default type border.</div>
                <div class="hint">Border size must be: 744 x 1039 px.</div>
                <button type="button" id="removeBorderBtn" class="btn btnSecondary" style="display:none; margin-top:5px;">
                  Remove Custom Border
                </button>
              </label>
              <br>
              <div class="field">
                <span class="label">Art Adjustments (Scroll wheel on art also works)</span>
                <div class="row3">
                  <input type="number" id="artScaleInput" class="input-dark" step="0.1" value="1" title="Scale" />
                  <input type="number" id="artXInput" class="input-dark" step="1" value="0" title="X Position" />
                  <input type="number" id="artYInput" class="input-dark" step="1" value="0" title="Y Position" />
                </div>
              </div>
            </fieldset>
          </div>
        </div>

        <div class="actions cardActions">
          <button type="button" id="saveCardBtn" class="btn btnPrimary">Save to Gallery</button>
          <button type="button" id="updateCardBtn" class="btn btnSecondary isHidden">Update Card</button>
          <button type="button" id="resetBtn" class="btn btnSecondary">Reset</button>
          <label class="exportField actionExportField">
            <select id="exportFormat" class="input-dark">
              <option value="png">PNG (High Res)</option>
              <option value="jpeg">JPEG</option>
              <option value="svg">SVG</option>
              <option value="pdf">PDF (Print)</option>
            </select>
          </label>
          <button type="button" id="exportBtn" class="btn btnSecondary">Download Card</button>
          <a href="../pages/card_gallery.html" class="btn btnSecondary" id="openGalleryBtn">Open Gallery</a>
        </div>
      </form>
    </section>

    <section class="previewPanel">
      <div class="previewWrap">
        
        <div id="cardPreview" class="card" role="img" aria-label="Card preview">
          
          <img id="artImg" class="layer layerArt" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="display: none;" />

          <img id="cardBorder" class="layer layerBorder" alt="" style="display: none;" />
          <br>
          <div class="topBar">
            <div class="manaBadge">
              <span id="manaText" class="manaText">1</span>
              <div class="manaSymbols" id="manaSymbols"></div>
            </div>
            <div class="namePlate">
              <div id="nameText" class="nameText">Sample Name</div>
            </div>
            <div id="regionBadge" class="regionBadge"></div>
          </div>
          <br>
          <div class="tagsBar">
            <div id="tagsText" class="tagsLine">Sample Tags</div>
          </div>

          <div class="rulesBox">
            <div id="descText" class="desc">Sample Description</div>
          </div>

          <div class="stats">
            <span class="statSlotGuide statSlotLeftPos" id="statGuideLeft"></span>
            <span class="statSlotGuide statSlotRightPos" id="statGuideRight"></span>
            <span class="statSlotValue statSlotLeftPos" id="statImgDamageNum">1</span>
            <span class="statSlotValue statSlotRightPos" id="statImgHealthNum">1</span>
          </div>

          <div id="rarityGem" class="rarityGem">
            <svg viewBox="0 0 100 100" class="raritySvg">
              <defs>
                <linearGradient id="rarityGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop id="rarityStop1" offset="0%" stop-color="#fff" />
                  <stop id="rarityStop2" offset="100%" stop-color="#000" />
                </linearGradient>
                <linearGradient id="rarityShine" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                  <stop offset="50%" stop-color="rgba(255,255,255,0.6)" />
                  <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                </linearGradient>
              </defs>
              <polygon id="rarityDiamond" points="50,2 98,50 50,98 2,50" fill="url(#rarityGradient)" stroke="white" stroke-opacity="0.22" stroke-width="4" stroke-linejoin="round" />
              <polygon id="rarityDiamondShine" points="50,2 98,50 50,98 2,50" fill="url(#rarityShine)" opacity="0.55" />
              <polygon id="rarityAlt" points="50,0 64,10 84,8 92,24 100,38 90,50 100,62 92,76 84,92 64,90 50,100 36,90 16,92 8,76 0,62 10,50 0,38 8,24 16,8 36,10" fill="url(#rarityGradient)" stroke="white" stroke-opacity="0.26" stroke-width="4" stroke-linejoin="round" style="display:none" />
              <polygon id="rarityAltShine" points="50,0 64,10 84,8 92,24 100,38 90,50 100,62 92,76 84,92 64,90 50,100 36,90 16,92 8,76 0,62 10,50 0,38 8,24 16,8 36,10" fill="url(#rarityShine)" opacity="0.55" style="display:none" />
            </svg>
          </div>

        </div> </div>
      
    </section>
  </main>
  <div id="uiToastHost" class="toastHost" aria-live="polite"></div>
  
  <script id="ml-layout" src="../dyn/layout.js" data-base=".." data-root="../.." defer></script>
  <script src="../dyn/card_storage.js"></script>
  <script src="script.js"></script>
</body>
</html>
